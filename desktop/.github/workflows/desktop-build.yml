# Manual desktop installer build.
#
# Trigger: `workflow_dispatch` only. Pick a version string in the GitHub UI
# (e.g. v0.2.0) and the workflow will:
#   1. Build the Go sidecar for the runner's OS/arch.
#   2. Run `task make` to produce installers via Electron Forge:
#        - linux   -> AppImage         (out/make/AppImage/x64/*.AppImage)
#        - windows -> Squirrel.Windows (out/make/squirrel.windows/x64/*Setup.exe)
#      ZIPs are also produced as portable fallbacks.
#   3. Upload each platform's `out/make/` tree as a workflow artifact.
#   4. Attach all artifacts to a freshly-created draft GitHub Release tagged
#      with the chosen version.
#
# Notes:
#   - Verify gate (`task verify`) is intentionally skipped here; this workflow
#     assumes the requester has already validated locally. The tagged
#     `release.yml` pipeline still gates GoReleaser on verify for the CLI.
#   - Cross-compilation is not attempted. Each OS builds its own installer
#     under its native runner; macOS is out of scope for now (no signing).

name: desktop-build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v0.2.0). A draft release will be created with this tag.'
        required: true
        type: string
      prerelease:
        description: 'Mark the draft release as a prerelease.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write # required to create the draft GitHub Release.

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          # Pin to windows-2022 (Server 2022) instead of windows-latest because
          # electron-winstaller's bundled Squirrel.exe shells out to 7z.exe and
          # fails on the windows-latest -> windows-2025 transition with
          # "The system cannot find the file specified". Revisit once
          # electron-winstaller ships a build that works on Server 2025.
          - os: windows-2022
            label: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # System deps:
      #   - rsvg-convert: rendered by `task icons` (a `task make` dep).
      #   - mksquashfs:   required by @reforged/maker-appimage to assemble
      #                   the AppImage squashfs payload. Linux-only.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin squashfs-tools

      - name: Install Windows system deps
        if: runner.os == 'Windows'
        run: choco install -y --no-progress rsvg-convert

      - run: pnpm install --frozen-lockfile

      - name: task make
        run: task make

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.label }}
          path: out/make/**/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Flatten the artifact tree so softprops/action-gh-release sees one file
      # per line. Forge's `out/make/` layout is deeply nested
      # (e.g. AppImage/x64/relay-0.1.0-x86_64.AppImage).
      - name: Collect release assets
        id: collect
        run: |
          mkdir -p release-assets
          find artifacts -type f \
            \( -iname '*.AppImage' -o -iname '*Setup.exe' -o -iname '*.nupkg' \
               -o -iname 'RELEASES' -o -iname '*.zip' \) \
            -exec cp -v {} release-assets/ \;
          ls -la release-assets/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: true
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
