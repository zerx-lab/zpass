version: "3"

# Single source of orchestration for the scaffold. The non-obvious order:
#   change Go API -> task openapi -> task codegen -> TS recompiles.
# `task dev` and `task build` chain those for you.

vars:
  GO_BIN: desktop-backend
  # Directory uses Node's arch naming (x64/arm64/ia32) because it's consumed by
  # Electron at runtime via `process.arch`. Go's GOARCH (amd64/386) is mapped here.
  NODE_ARCH: '{{if eq ARCH "amd64"}}x64{{else if eq ARCH "386"}}ia32{{else}}{{ARCH}}{{end}}'
  # Windows 上 task 的 OS 变量是 "windows", 但 Electron 的 process.platform 是
  # "win32" — backend.ts 用后者拼路径找 sidecar, 所以这里要把目录名也对齐到
  # "win32-x64", 否则打包后 Windows 端找不到 desktop-backend.exe (linux/darwin
  # 两侧命名一致, 不受影响).
  NODE_OS: '{{if eq OS "windows"}}win32{{else}}{{OS}}{{end}}'
  PLATFORM_DIR: "{{.NODE_OS}}-{{.NODE_ARCH}}"
  BIN_OUT: 'bin/{{.PLATFORM_DIR}}/{{.GO_BIN}}{{if eq OS "windows"}}.exe{{end}}'
  AGENT_BIN_OUT: 'bin/{{.PLATFORM_DIR}}/zpass-agent{{if eq OS "windows"}}.exe{{end}}'
  NATIVE_HOST_BIN_OUT: 'bin/{{.PLATFORM_DIR}}/zpass-native-host{{if eq OS "windows"}}.exe{{end}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ---- Go ----

  openapi:
    desc: Dump the OpenAPI schema from Go to openapi.yaml
    cmds:
      - go run . openapi openapi.yaml
    sources:
      - "**/*.go"
    generates:
      - openapi.yaml

  build:go:
    desc: Build the Go sidecar binary into bin/<os>-<arch>/
    cmds:
      - mkdir -p "bin/{{.PLATFORM_DIR}}"
      - go build -trimpath -ldflags="-s -w" -o "{{.BIN_OUT}}" .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BIN_OUT}}"

  build:agent:
    desc: Build the SSH-agent daemon (cmd/zpass-agent) into bin/<os>-<arch>/
    # Mirrors what the Wails project shipped: a separate binary the GUI
    # supervises so SSH keys can outlive the GUI process. The GUI's
    # SshAgentService.LocateAgentBinary looks for this file next to itself.
    cmds:
      - mkdir -p "bin/{{.PLATFORM_DIR}}"
      - cmd: go build -trimpath -ldflags="-s -w" -o "{{.AGENT_BIN_OUT}}" ./cmd/zpass-agent
        platforms: [linux, darwin]
      - cmd: go build -trimpath -ldflags="-s -w -H windowsgui" -o "{{.AGENT_BIN_OUT}}" ./cmd/zpass-agent
        platforms: [windows]
    sources:
      - "cmd/zpass-agent/**/*.go"
      - "internal/sshagentproto/**/*.go"
    generates:
      - "{{.AGENT_BIN_OUT}}"

  build:nativehost:
    desc: Build the browser native-messaging host into bin/<os>-<arch>/
    cmds:
      - mkdir -p "bin/{{.PLATFORM_DIR}}"
      - go build -trimpath -ldflags="-s -w" -o "{{.NATIVE_HOST_BIN_OUT}}" ./cmd/zpass-native-host
    sources:
      - "cmd/zpass-native-host/**/*.go"
      - "internal/nativebridge/**/*.go"
    generates:
      - "{{.NATIVE_HOST_BIN_OUT}}"

  test:go:
    desc: Run Go tests
    cmds:
      - go test ./...

  lint:go:
    desc: Run golangci-lint (govet/nilness, staticcheck, errcheck, ineffassign, unused, gofmt)
    cmds:
      - golangci-lint run ./...

  install:cli:
    desc: Install the `zerx` scaffold CLI into $GOBIN (or $GOPATH/bin)
    cmds:
      - go install ./cmd/zerx

  # ---- TS / Electron ----

  install:
    desc: Install pnpm dependencies
    cmds:
      - pnpm install
    sources:
      - package.json
      - pnpm-lock.yaml

  codegen:
    desc: Regenerate electron/src/api/schema.ts from openapi.yaml
    deps: [openapi]
    cmds:
      - pnpm run codegen
    sources:
      - openapi.yaml
    generates:
      - electron/src/api/schema.ts

  typecheck:
    desc: TS typecheck (no emit)
    deps: [codegen]
    cmds:
      - pnpm run typecheck

  lint:ts:
    desc: Biome lint over electron/src (schema.ts excluded)
    cmds:
      - pnpm exec biome lint

  lint:
    desc: Run all linters (Go + TS)
    deps: [lint:go, lint:ts]

  verify:
    desc: Acceptance gate before commit (typecheck + tests + lint)
    deps: [typecheck, test:go, lint]

  # ---- Composite ----

  dev:
    desc: Build Go sidecar, regenerate types, then launch Electron + Go watcher
    # On *.go change the watcher rebuilds the sidecar and touches .dev-reload;
    # Electron's main process fs.watches that file and respawns the sidecar.
    # See scripts/dev-watcher.mjs and installDevReloader in
    # electron/src/main/main.ts.
    deps: [build:go, codegen]
    cmds:
      - pnpm exec concurrently -k -n electron,watcher -c blue,magenta "pnpm run start" "node scripts/dev-watcher.mjs"

  clean:dev:
    desc: Remove dev-only artifacts (.dev-reload)
    cmds:
      - rm -f .dev-reload

  build:
    desc: Produce an unpacked Electron app (out/<app>-<platform>-<arch>/) with the Go sidecar bundled
    # `icns` 仅 darwin 跑, 其它平台 task 会因 platforms:[darwin] 自动 skip,
    # 所以可以无脑放在 deps 里; forge.config.ts 在 darwin 下需要 .icns 才能给
    # .app 正确套上品牌图标.
    deps: [build:go, build:agent, build:nativehost, codegen, typecheck, icons, icns]
    cmds:
      - pnpm run package

  make:
    desc: Produce distributable installers/archives via Electron Forge makers
    deps: [build:go, build:agent, build:nativehost, codegen, typecheck, icons, icns]
    cmds:
      - pnpm run make

  build:arch:
    desc: Produce an Arch Linux pacman package (.pkg.tar.zst) under out/make/arch/
    # No Electron Forge maker for pacman exists today (到2026, the @reforged
    # suite covers AppImage/Flatpak/Snap but not pacman). We generate a
    # PKGBUILD on the fly that wraps the unpacked app from `task build` and
    # hand it to makepkg. See scripts/make-arch.sh for the why.
    platforms: [linux]
    deps: [build]
    cmds:
      - bash scripts/make-arch.sh

  # ---- Icons / desktop integration ----
  #
  # Wayland compositors don't accept window-pixmap icons the way X11 does. The
  # taskbar/launcher icon is looked up by xdg_toplevel.app_id -> .desktop file
  # -> Icon name -> hicolor theme PNG. So for `task dev` to show the ZPass
  # logo instead of Electron's default, we install a user-level .desktop +
  # hicolor icons matching the app_id "zpass" (see app.setName in main.ts).

  icons:
    desc: Render assets/logo/zpass.svg into multi-size PNGs under assets/logo/png/
    cmds:
      - mkdir -p assets/logo/png
      - for: [16, 32, 48, 64, 128, 256, 512]
        cmd: magick ../assets/logo.png -resize {{.ITEM}}x{{.ITEM}} -strip assets/logo/png/zpass-{{.ITEM}}.png
    sources:
      - ../assets/logo.png
    generates:
      - assets/logo/png/zpass-16.png
      - assets/logo/png/zpass-32.png
      - assets/logo/png/zpass-48.png
      - assets/logo/png/zpass-64.png
      - assets/logo/png/zpass-128.png
      - assets/logo/png/zpass-256.png
      - assets/logo/png/zpass-512.png

  icns:
    # macOS 专用: forge.config.ts 的 icon 字段在 darwin 下会找 assets/logo/zpass.icns,
    # 不存在的话 Forge 静默回退到 Electron 默认蓝色原子图标 -> .app / dmg / Dock /
    # Finder 全部显示成 Electron logo. 用 macOS 自带的 sips + iconutil 把 task icons
    # 已经渲染好的 PNG 组装成 .iconset 再封成 .icns; 跨平台 alt 工具 (png2icns 之类)
    # 又要引依赖, 反正 dmg 也只能在 macOS runner 上做, 索性 darwin-only.
    desc: Generate assets/logo/zpass.icns from multi-size PNGs (macOS only)
    platforms: [darwin]
    deps: [icons]
    cmds:
      - rm -rf assets/logo/zpass.iconset
      - mkdir -p assets/logo/zpass.iconset
      - sips -z 16 16   assets/logo/png/zpass-16.png  --out assets/logo/zpass.iconset/icon_16x16.png
      - sips -z 32 32   assets/logo/png/zpass-32.png  --out assets/logo/zpass.iconset/icon_16x16@2x.png
      - sips -z 32 32   assets/logo/png/zpass-32.png  --out assets/logo/zpass.iconset/icon_32x32.png
      - sips -z 64 64   assets/logo/png/zpass-64.png  --out assets/logo/zpass.iconset/icon_32x32@2x.png
      - sips -z 128 128 assets/logo/png/zpass-128.png --out assets/logo/zpass.iconset/icon_128x128.png
      - sips -z 256 256 assets/logo/png/zpass-256.png --out assets/logo/zpass.iconset/icon_128x128@2x.png
      - sips -z 256 256 assets/logo/png/zpass-256.png --out assets/logo/zpass.iconset/icon_256x256.png
      - sips -z 512 512 assets/logo/png/zpass-512.png --out assets/logo/zpass.iconset/icon_256x256@2x.png
      - sips -z 512 512 assets/logo/png/zpass-512.png --out assets/logo/zpass.iconset/icon_512x512.png
      - iconutil --convert icns assets/logo/zpass.iconset --output assets/logo/zpass.icns
      - rm -rf assets/logo/zpass.iconset
    sources:
      - assets/logo/png/zpass-16.png
      - assets/logo/png/zpass-32.png
      - assets/logo/png/zpass-48.png
      - assets/logo/png/zpass-64.png
      - assets/logo/png/zpass-128.png
      - assets/logo/png/zpass-256.png
      - assets/logo/png/zpass-512.png
    generates:
      - assets/logo/zpass.icns

  install:desktop:
    desc: Install hicolor icons + zpass.desktop into ~/.local/share (Linux dev only)
    platforms: [linux]
    deps: [icons]
    cmds:
      - for: [16, 32, 48, 64, 128, 256, 512]
        cmd: install -Dm644 assets/logo/png/zpass-{{.ITEM}}.png "$HOME/.local/share/icons/hicolor/{{.ITEM}}x{{.ITEM}}/apps/zpass.png"
      - install -Dm644 assets/logo/zpass.desktop "$HOME/.local/share/applications/zpass.desktop"
      - gtk-update-icon-cache -t "$HOME/.local/share/icons/hicolor" 2>/dev/null || true
      - update-desktop-database "$HOME/.local/share/applications" 2>/dev/null || true

  uninstall:desktop:
    desc: Remove the dev-installed hicolor icons + zpass.desktop
    platforms: [linux]
    cmds:
      - for: [16, 32, 48, 64, 128, 256, 512]
        cmd: rm -f "$HOME/.local/share/icons/hicolor/{{.ITEM}}x{{.ITEM}}/apps/zpass.png"
      - rm -f "$HOME/.local/share/applications/zpass.desktop"
      - gtk-update-icon-cache -t "$HOME/.local/share/icons/hicolor" 2>/dev/null || true
      - update-desktop-database "$HOME/.local/share/applications" 2>/dev/null || true

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf bin .vite out node_modules/.cache
      - rm -f openapi.yaml electron/src/api/schema.ts .dev-reload
