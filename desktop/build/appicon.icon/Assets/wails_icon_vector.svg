<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  ZPass Desktop 应用图标 —— 7×7 圆点矩阵构成的字母 "Z"
  ---------------------------------------------------------------------------
  设计理念："OTP FEEL" —— 用一次性密码 / 验证码刻度的颗粒感呈现品牌字母。
  视觉结构：
    · 顶部 2 行  →  Z 上横（7 列全黑）
    · 中间 3 行  →  Z 对角线（右上 → 左下，每行 2 个黑点）
    · 底部 2 行  →  Z 下横（7 列全黑）
    · 中间 3 行的非对角线位置以低透明度灰点保留，构成完整 7×7 网格底纹
      （呼应"OTP 验证码刻度"的设计语义）

  viewBox（583×533）与 icon.json 中 macOS Icon Composer 的
  position（scale 1.25 / translation 36.89, 4.97）配合，
  保持原 Wails SVG 的画布维度不变，避免改动 icon.json。

  坐标网格：
    cell = 70px，整体 7×70 = 490 居中放入 583×533 画布
    xPad = (583 - 490) / 2 = 46.5
    yPad = (533 - 490) / 2 = 21.5
    cx(col) = 81.5 + col × 70
    cy(row) = 56.5 + row × 70
    r      = 30（密集但不重叠，复刻 logo.png 的紧实点阵手感）

  颜色：所有点 fill="currentColor"，便于前端用 CSS color 控色；
  macOS Icon Composer 会按 alpha 当模板图处理（fill-specializations 接管着色）。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 583 533" version="1.1">
  <g fill="currentColor">

    <!-- ============ 背景颗粒：中间 3 行的非对角线位置（浅灰，构成 OTP 刻度感） ============ -->
    <g opacity="0.18">
      <!-- 行 2 (cy=196.5)：cols 0,1,2,3,6 -->
      <circle cx="81.5"  cy="196.5" r="30"/>
      <circle cx="151.5" cy="196.5" r="30"/>
      <circle cx="221.5" cy="196.5" r="30"/>
      <circle cx="291.5" cy="196.5" r="30"/>
      <circle cx="501.5" cy="196.5" r="30"/>
      <!-- 行 3 (cy=266.5)：cols 0,1,2,5,6 -->
      <circle cx="81.5"  cy="266.5" r="30"/>
      <circle cx="151.5" cy="266.5" r="30"/>
      <circle cx="221.5" cy="266.5" r="30"/>
      <circle cx="431.5" cy="266.5" r="30"/>
      <circle cx="501.5" cy="266.5" r="30"/>
      <!-- 行 4 (cy=336.5)：cols 0,1,4,5,6 -->
      <circle cx="81.5"  cy="336.5" r="30"/>
      <circle cx="151.5" cy="336.5" r="30"/>
      <circle cx="361.5" cy="336.5" r="30"/>
      <circle cx="431.5" cy="336.5" r="30"/>
      <circle cx="501.5" cy="336.5" r="30"/>
    </g>

    <!-- ============ Z 字主体（实心黑点） ============ -->

    <!-- 行 0 (cy=56.5)：上横 7 列 -->
    <circle cx="81.5"  cy="56.5"  r="30"/>
    <circle cx="151.5" cy="56.5"  r="30"/>
    <circle cx="221.5" cy="56.5"  r="30"/>
    <circle cx="291.5" cy="56.5"  r="30"/>
    <circle cx="361.5" cy="56.5"  r="30"/>
    <circle cx="431.5" cy="56.5"  r="30"/>
    <circle cx="501.5" cy="56.5"  r="30"/>

    <!-- 行 1 (cy=126.5)：上横 7 列 -->
    <circle cx="81.5"  cy="126.5" r="30"/>
    <circle cx="151.5" cy="126.5" r="30"/>
    <circle cx="221.5" cy="126.5" r="30"/>
    <circle cx="291.5" cy="126.5" r="30"/>
    <circle cx="361.5" cy="126.5" r="30"/>
    <circle cx="431.5" cy="126.5" r="30"/>
    <circle cx="501.5" cy="126.5" r="30"/>

    <!-- 行 2 (cy=196.5)：对角线右侧 cols 4,5 -->
    <circle cx="361.5" cy="196.5" r="30"/>
    <circle cx="431.5" cy="196.5" r="30"/>

    <!-- 行 3 (cy=266.5)：对角线中间 cols 3,4 -->
    <circle cx="291.5" cy="266.5" r="30"/>
    <circle cx="361.5" cy="266.5" r="30"/>

    <!-- 行 4 (cy=336.5)：对角线左侧 cols 2,3 -->
    <circle cx="221.5" cy="336.5" r="30"/>
    <circle cx="291.5" cy="336.5" r="30"/>

    <!-- 行 5 (cy=406.5)：下横 7 列 -->
    <circle cx="81.5"  cy="406.5" r="30"/>
    <circle cx="151.5" cy="406.5" r="30"/>
    <circle cx="221.5" cy="406.5" r="30"/>
    <circle cx="291.5" cy="406.5" r="30"/>
    <circle cx="361.5" cy="406.5" r="30"/>
    <circle cx="431.5" cy="406.5" r="30"/>
    <circle cx="501.5" cy="406.5" r="30"/>

    <!-- 行 6 (cy=476.5)：下横 7 列 -->
    <circle cx="81.5"  cy="476.5" r="30"/>
    <circle cx="151.5" cy="476.5" r="30"/>
    <circle cx="221.5" cy="476.5" r="30"/>
    <circle cx="291.5" cy="476.5" r="30"/>
    <circle cx="361.5" cy="476.5" r="30"/>
    <circle cx="431.5" cy="476.5" r="30"/>
    <circle cx="501.5" cy="476.5" r="30"/>

  </g>
</svg>
