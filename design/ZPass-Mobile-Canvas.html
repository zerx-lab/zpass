<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>ZPass Mobile — Design Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; }
  body { font-family: "Geist", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  /* Hide scrollbars inside phone mockups — keep scrollability */
  .zp-phone *::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .zp-phone * { scrollbar-width: none; -ms-overflow-style: none; }
  .section-title { font-size: 26px; font-weight: 600; color: rgba(40,30,20,0.88); letter-spacing: -0.02em; margin: 0 0 4px; }
  .section-sub { font-size: 14px; color: rgba(60,50,40,0.6); margin: 0; }
  .section-meta { font-family: "Geist Mono", monospace; font-size: 11px; color: rgba(60,50,40,0.5); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .frame-label { font-family: "Geist Mono", monospace; font-size: 11px; color: rgba(40,30,20,0.75); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .frame-sub { font-size: 13px; color: rgba(60,50,40,0.65); margin-top: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/i18n.jsx"></script>
<script type="text/babel" src="src/mobile/design-canvas.jsx"></script>
<script type="text/babel" src="src/mobile/zp-shared.jsx"></script>
<script type="text/babel" src="src/mobile/zp-unlock.jsx"></script>
<script type="text/babel" src="src/mobile/zp-vault.jsx"></script>
<script type="text/babel" src="src/mobile/zp-detail.jsx"></script>
<script type="text/babel" src="src/mobile/zp-totp.jsx"></script>
<script type="text/babel" src="src/mobile/zp-generator.jsx"></script>
<script type="text/babel" src="src/mobile/zp-security.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
const ZPI18nProvider = window.ZPASS_I18N.I18nProvider;

// Merge mobile strings into global STRINGS
Object.keys(MOBILE_STRINGS).forEach(lang => {
  Object.assign(window.ZPASS_I18N.STRINGS[lang], MOBILE_STRINGS[lang]);
});

const ITEMS_LIST = window.ZPASS_DATA.ITEMS;
const FAV = window.ZPASS_DATA.FAVICONS;

function daysAgo(ms, lang='en') {
  const d = Math.floor((Date.now() - ms) / (24*3600*1000));
  if (lang === 'zh') {
    if (d === 0) return '今天';
    if (d < 30) return `${d}天前`;
    if (d < 365) return `${Math.floor(d/30)}月前`;
    return `${Math.floor(d/365)}年前`;
  }
  if (d === 0) return 'today';
  if (d < 30) return `${d}d`;
  if (d < 365) return `${Math.floor(d/30)}mo`;
  return `${Math.floor(d/365)}y`;
}

function enrich(items, lang) {
  return items.filter(i => i.type === 'login').map(it => ({
    ...it,
    favT: FAV[it.fav]?.t || it.name.slice(0,2).toUpperCase(),
    modifiedLbl: daysAgo(it.modified, lang),
  }));
}

// ─────────────────────────────────────────────────
// Phone shell with mock chrome (chrome = device bezel)
// ─────────────────────────────────────────────────
function Phone({ children, theme = 'dark', platform = 'ios', w = 390, h = 812 }) {
  const c = ZP_TOKENS[theme];
  const r = platform === 'ios' ? 48 : 36;
  return (
    <div className="zp-phone" style={{
      width: w, height: h, borderRadius: r, overflow: 'hidden',
      background: c.bg, color: c.text,
      fontFamily: ZP_FONTS.sans, WebkitFontSmoothing: 'antialiased',
      boxShadow: '0 0 0 9px #1a1a1c, 0 0 0 10px rgba(0,0,0,0.35), 0 40px 80px rgba(0,0,0,0.18)',
      position: 'relative',
      flexShrink: 0,
    }}>
      {children}
    </div>
  );
}

// Paired frame = iOS + Android side-by-side with platform labels
function Paired({ label, children, iosChildren, androidChildren, theme = 'dark' }) {
  const c = ZP_TOKENS[theme];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      {label && <div className="frame-label">{label}</div>}
      <div style={{ display: 'flex', gap: 32, alignItems: 'flex-start' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center' }}>
          <Phone theme={theme} platform="ios">{iosChildren}</Phone>
          <div style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, color: 'rgba(60,50,40,0.55)', textTransform: 'uppercase', letterSpacing: 0.1 }}>iOS · 390×812</div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center' }}>
          <Phone theme={theme} platform="android">{androidChildren}</Phone>
          <div style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, color: 'rgba(60,50,40,0.55)', textTransform: 'uppercase', letterSpacing: 0.1 }}>Android · 390×812</div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────
// App — language toggle in toolbar
// ─────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState('zh');
  const [theme, setTheme] = useState('dark');

  return (
    <ZPI18nProvider lang={lang} setLang={setLang}>
      <Inner theme={theme} setTheme={setTheme} lang={lang} setLang={setLang}/>
    </ZPI18nProvider>
  );
}

function Inner({ theme, setTheme, lang, setLang }) {
  const { t } = window.ZPASS_I18N.useI18n();
  const items = useMemo(() => enrich(ITEMS_LIST, lang), [lang]);
  const totpItems = items.filter(i => i.totp);

  return (
    <>
      {/* top toolbar */}
      <div style={{
        position: 'fixed', top: 16, left: 16, zIndex: 100,
        display: 'flex', gap: 6, padding: 6,
        background: 'rgba(255,255,255,0.85)',
        backdropFilter: 'blur(10px)',
        border: '1px solid rgba(0,0,0,0.06)',
        borderRadius: 10, fontFamily: '"Geist Mono", monospace',
        boxShadow: '0 2px 8px rgba(0,0,0,0.06)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '0 10px 0 8px', borderRight: '1px solid rgba(0,0,0,0.08)' }}>
          <div style={{ width: 20, height: 20, borderRadius: 4, background: '#141416', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700 }}>Z</div>
          <span style={{ fontSize: 12, fontWeight: 600, color: '#141416' }}>ZPass · Mobile</span>
        </div>
        {[
          { k: 'lang', opts: [['en','EN'],['zh','中文']], v: lang, set: setLang },
          { k: 'theme', opts: [['dark','Dark'],['light','Light']], v: theme, set: setTheme },
        ].map(seg => (
          <div key={seg.k} style={{ display: 'flex', borderRadius: 6, overflow: 'hidden', background: 'rgba(0,0,0,0.04)' }}>
            {seg.opts.map(([k,label]) => (
              <button key={k} onClick={() => seg.set(k)} style={{
                padding: '6px 10px', fontSize: 11, border: 0, cursor: 'pointer',
                background: seg.v === k ? '#141416' : 'transparent',
                color: seg.v === k ? '#fff' : '#4a4a4e',
                fontFamily: '"Geist Mono", monospace',
              }}>{label}</button>
            ))}
          </div>
        ))}
        <a href="ZPass-Mobile.html" style={{
          padding: '6px 12px', fontSize: 11, background: '#141416', color: '#fff',
          borderRadius: 6, textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 6,
        }}>Open prototype →</a>
      </div>

      <DesignCanvas>
        <div style={{ padding: '40px 80px 20px' }}>
          <h1 style={{ fontSize: 44, fontWeight: 600, letterSpacing: -0.03, color: 'rgba(30,25,20,0.92)', margin: '0 0 8px' }}>ZPass · Mobile</h1>
          <p style={{ fontSize: 16, color: 'rgba(60,50,40,0.6)', maxWidth: 720, margin: 0, lineHeight: 1.55 }}>
            Companion mobile app to the desktop vault. Monochrome, mono-accented, dark-first — same visual DNA ported to one-handed use.
            Signature mobile moves: giant TOTP countdown, swipe-to-copy on list rows, breach strip on home, and a center "new item" tab for fast capture.
          </p>
          <div style={{ marginTop: 12, display: 'flex', gap: 8 }}>
            <span style={{ fontFamily: '"Geist Mono", monospace', fontSize: 11, padding: '4px 8px', border: '1px solid rgba(0,0,0,0.12)', borderRadius: 4, color: 'rgba(40,30,20,0.7)' }}>iOS · Android</span>
            <span style={{ fontFamily: '"Geist Mono", monospace', fontSize: 11, padding: '4px 8px', border: '1px solid rgba(0,0,0,0.12)', borderRadius: 4, color: 'rgba(40,30,20,0.7)' }}>dark · light</span>
            <span style={{ fontFamily: '"Geist Mono", monospace', fontSize: 11, padding: '4px 8px', border: '1px solid rgba(0,0,0,0.12)', borderRadius: 4, color: 'rgba(40,30,20,0.7)' }}>EN · 中文</span>
            <span style={{ fontFamily: '"Geist Mono", monospace', fontSize: 11, padding: '4px 8px', border: '1px solid rgba(0,0,0,0.12)', borderRadius: 4, color: 'rgba(40,30,20,0.7)' }}>Geist / Geist Mono</span>
          </div>
        </div>

        {/* SECTION 1 — Unlock */}
        <DCSection title="1 · Unlock" subtitle="Two variants: biometric-first (Face ID / fingerprint) and master-PIN keypad.">
          <Paired label="Biometric unlock" theme={theme}
            iosChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="ios"/>
                <ZPUnlockFaceID theme={theme} t={t} platform="ios"/>
                <ZPHomeIndicator theme={theme}/>
              </div>
            }
            androidChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="android"/>
                <ZPUnlockFaceID theme={theme} t={t} platform="android"/>
                <ZPGestureBar theme={theme}/>
              </div>
            }
          />
          <Paired label="Master PIN — fallback" theme={theme}
            iosChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="ios"/>
                <ZPUnlockPIN theme={theme} t={t} platform="ios"/>
                <ZPHomeIndicator theme={theme}/>
              </div>
            }
            androidChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="android"/>
                <ZPUnlockPIN theme={theme} t={t} platform="android"/>
                <ZPGestureBar theme={theme}/>
              </div>
            }
          />
          <DCPostIt top={-12} left={740} rotate={3} width={200}>
            <b>Decision:</b> monochrome Face ID ring — no tinted accent. Consistent with desktop's white-on-black language.
          </DCPostIt>
        </DCSection>

        {/* SECTION 2 — Vault list: 3 variations */}
        <DCSection title="2 · Vault list — three directions" subtitle="A. Dense, desktop-parity. B. Cards with swipe-to-copy. C. Dashboard with breach strip + pinned grid.">
          <Paired label="A. Dense list" theme={theme}
            iosChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="ios"/>
                <ZPVaultDense theme={theme} t={t} items={items.slice(0,9)} activeId="i1"/>
                <ZPTabBar tab="vault" t={t} theme={theme} platform="ios"/>
                <ZPHomeIndicator theme={theme}/>
              </div>
            }
            androidChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="android"/>
                <ZPVaultDense theme={theme} t={t} items={items.slice(0,9)} activeId="i1"/>
                <ZPTabBar tab="vault" t={t} theme={theme} platform="android"/>
                <ZPGestureBar theme={theme}/>
              </div>
            }
          />
          <Paired label="B. Cards · swipe-to-copy" theme={theme}
            iosChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="ios"/>
                <ZPVaultCards theme={theme} t={t} items={items.slice(0,7)}/>
                <ZPTabBar tab="vault" t={t} theme={theme} platform="ios"/>
                <ZPHomeIndicator theme={theme}/>
              </div>
            }
            androidChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="android"/>
                <ZPVaultCards theme={theme} t={t} items={items.slice(0,7)}/>
                <ZPTabBar tab="vault" t={t} theme={theme} platform="android"/>
                <ZPGestureBar theme={theme}/>
              </div>
            }
          />
          <Paired label="C. Dashboard · pinned + breach strip" theme={theme}
            iosChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="ios"/>
                <ZPVaultDashboard theme={theme} t={t} items={items.slice(0,10)}/>
                <ZPTabBar tab="vault" t={t} theme={theme} platform="ios"/>
                <ZPHomeIndicator theme={theme}/>
              </div>
            }
            androidChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="android"/>
                <ZPVaultDashboard theme={theme} t={t} items={items.slice(0,10)}/>
                <ZPTabBar tab="vault" t={t} theme={theme} platform="android"/>
                <ZPGestureBar theme={theme}/>
              </div>
            }
          />
          <DCPostIt top={-20} left={1500} rotate={-2} width={210}>
            <b>Pick one</b> or ship C as home and A behind "list" toggle. B is the one that feels most "mobile" but is riskier for users who like calm.
          </DCPostIt>
        </DCSection>

        {/* SECTION 3 — Item detail + TOTP */}
        <DCSection title="3 · Item detail & full-bleed TOTP" subtitle="Detail view keeps the monospace field-group from desktop; TOTP gets its own hero screen — the single most-used action on mobile.">
          <Paired label="Login detail" theme={theme}
            iosChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="ios"/>
                <ZPDetail theme={theme} t={t} item={items[0]}/>
                <ZPHomeIndicator theme={theme}/>
              </div>
            }
            androidChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="android"/>
                <ZPDetail theme={theme} t={t} item={items[0]}/>
                <ZPGestureBar theme={theme}/>
              </div>
            }
          />
          <Paired label="TOTP viewer — giant countdown" theme={theme}
            iosChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="ios"/>
                <ZPTotp theme={theme} t={t} items={totpItems}/>
                <ZPTabBar tab="gen" t={t} theme={theme} platform="ios"/>
                <ZPHomeIndicator theme={theme}/>
              </div>
            }
            androidChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="android"/>
                <ZPTotp theme={theme} t={t} items={totpItems}/>
                <ZPTabBar tab="gen" t={t} theme={theme} platform="android"/>
                <ZPGestureBar theme={theme}/>
              </div>
            }
          />
        </DCSection>

        {/* SECTION 4 — Generator + Security */}
        <DCSection title="4 · Generator & Security overview" subtitle="Generator: one-hand friendly slider + toggle grid. Security: hero score, four tiles, live breach monitor.">
          <Paired label="Password generator" theme={theme}
            iosChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="ios"/>
                <ZPGenerator theme={theme} t={t}/>
                <ZPTabBar tab="gen" t={t} theme={theme} platform="ios"/>
                <ZPHomeIndicator theme={theme}/>
              </div>
            }
            androidChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="android"/>
                <ZPGenerator theme={theme} t={t}/>
                <ZPTabBar tab="gen" t={t} theme={theme} platform="android"/>
                <ZPGestureBar theme={theme}/>
              </div>
            }
          />
          <Paired label="Security overview" theme={theme}
            iosChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="ios"/>
                <ZPSecurity theme={theme} t={t}/>
                <ZPTabBar tab="security" t={t} theme={theme} platform="ios"/>
                <ZPHomeIndicator theme={theme}/>
              </div>
            }
            androidChildren={
              <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                <ZPStatusBar theme={theme} platform="android"/>
                <ZPSecurity theme={theme} t={t}/>
                <ZPTabBar tab="security" t={t} theme={theme} platform="android"/>
                <ZPGestureBar theme={theme}/>
              </div>
            }
          />
          <DCPostIt top={-10} left={1500} rotate={2} width={200}>
            Score ring uses the same SVG recipe as the donut on desktop — consistent treatment.
          </DCPostIt>
        </DCSection>

        <div style={{ height: 60 }}/>
      </DesignCanvas>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
