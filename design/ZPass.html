<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>ZPass — a calmer password manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  /* Dark (default) — neutral near-black with cool undertone */
  --bg: #0c0c0d;
  --bg-elev: #111113;
  --bg-elev-2: #16161a;
  --bg-hover: #18181c;
  --bg-active: #1d1d22;
  --line: #232328;
  --line-soft: #1a1a1e;
  --text: #ececec;
  --text-2: #a8a8ac;
  --text-3: #6e6e73;
  --text-4: #45454a;
  --accent: #ececec;       /* primary = white; buttons contrast by background */
  --accent-ink: #0c0c0d;
  --accent-glow: rgba(255,255,255,0.04);
  --danger: #e55a4a;
  --warn: #c8934a;
  --ok: #5ea47a;
  --info: #6b9cc4;
  --grid: rgba(255,255,255,0.02);

  --radius-sm: 5px;
  --radius: 7px;
  --radius-lg: 10px;
  --radius-xl: 14px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.35);
  --shadow-lg: 0 20px 50px rgba(0,0,0,0.55);

  --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  --dens-row: 48px;
  --dens-pad: 16px;
}

[data-theme="light"] {
  --bg: #f5f5f3;
  --bg-elev: #fbfbf9;
  --bg-elev-2: #ffffff;
  --bg-hover: #ededea;
  --bg-active: #e4e4e0;
  --line: #e1e1dd;
  --line-soft: #ececea;
  --text: #141416;
  --text-2: #4a4a4e;
  --text-3: #77777c;
  --text-4: #a6a6aa;
  --accent: #141416;
  --accent-ink: #f5f5f3;
  --accent-glow: rgba(0,0,0,0.04);
  --danger: #b53d2b;
  --warn: #9a6a1a;
  --ok: #35734f;
  --info: #355a7a;
  --grid: rgba(0,0,0,0.03);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 20px 50px rgba(0,0,0,0.10);
}

[data-density="compact"] { --dens-row: 40px; --dens-pad: 12px; }
[data-density="comfy"]   { --dens-row: 56px; --dens-pad: 20px; }

[data-body="mono"] body, [data-body="mono"] { --font-sans: "Geist Mono", ui-monospace, monospace; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "ss02", "cv01";
  font-size: 14px;
  line-height: 1.45;
  min-height: 100vh;
}

button, input, select, textarea { font: inherit; color: inherit; }
button { background: none; border: 0; cursor: pointer; padding: 0; color: inherit; }
a { color: inherit; text-decoration: none; }
::selection { background: var(--accent); color: var(--accent-ink); }

.mono { font-family: var(--font-mono); font-feature-settings: "zero", "ss01"; }
.kbd {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 5px;
  border: 1px solid var(--line);
  background: var(--bg-elev-2);
  color: var(--text-2);
  line-height: 1;
  display: inline-flex; align-items: center; gap: 2px;
}

/* APP SHELL */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 240px 1fr;
  grid-template-rows: 48px 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar main";
  background: var(--bg);
}

/* TOPBAR */
.topbar {
  grid-area: topbar;
  display: flex; align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--line-soft);
  gap: 12px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 20;
}
.topbar .crumbs { display: flex; align-items: center; gap: 8px; color: var(--text-3); font-size: 13px; }
.topbar .crumbs b { color: var(--text); font-weight: 500; }
.topbar .spacer { flex: 1; }
.topbar .search {
  display: flex; align-items: center; gap: 10px;
  width: 360px; height: 32px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--bg-elev);
  color: var(--text-3);
  font-size: 13px;
  cursor: pointer;
  transition: border-color .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar .search > span { overflow: hidden; text-overflow: ellipsis; }
.topbar .search:hover { border-color: var(--text-4); color: var(--text-2); }
.topbar .icon-btn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--text-2);
  background: var(--bg-elev);
}
.topbar .icon-btn:hover { color: var(--text); background: var(--bg-hover); }

/* SIDEBAR */
.sidebar {
  grid-area: sidebar;
  border-right: 1px solid var(--line-soft);
  padding: 12px 10px;
  display: flex; flex-direction: column;
  background: var(--bg);
  position: sticky; top: 0; height: 100vh;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px 14px 8px;
  border-bottom: 1px solid var(--line-soft);
  margin-bottom: 12px;
}
.brand .logo {
  width: 26px; height: 26px; border-radius: 5px;
  background: var(--text);
  color: var(--bg);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-weight: 600; font-size: 14px;
}
.brand .name { font-weight: 600; letter-spacing: -0.01em; font-size: 15px; }
.brand .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); margin-left: auto; padding: 2px 6px; border: 1px solid var(--line); border-radius: 4px; }

.nav-section { padding: 10px 8px 6px; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 8px;
  border-radius: var(--radius-sm);
  color: var(--text-2);
  font-size: 13px;
  width: 100%;
  text-align: left;
  position: relative;
  white-space: nowrap;
}
.nav-item > span:not(.count):not(.sev) { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--bg-active); color: var(--text); }
.nav-item .count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.nav-item.active .count { color: var(--text-2); }
.nav-item svg { flex-shrink: 0; }

.sidebar-footer { margin-top: auto; padding: 10px 8px; border-top: 1px solid var(--line-soft); display: flex; align-items: center; gap: 10px; position: relative; }
.avatar {
  width: 26px; height: 26px; border-radius: 5px;
  background: var(--bg-elev-2);
  border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-weight: 600; font-size: 11px;
  color: var(--text);
  flex-shrink: 0;
}
.avatar-btn { cursor: pointer; transition: background .12s, border-color .12s; }
.avatar-btn:hover { background: var(--bg-hover); border-color: var(--text-4); }
.avatar-btn.open { background: var(--bg-active); border-color: var(--text-4); }
.user-meta { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; flex: 1; }
.user-meta .n { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-meta .m { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-meta-btn { background: transparent; border: 0; padding: 0; text-align: left; cursor: pointer; }
.user-meta-btn:hover .n { color: var(--text); }

/* User menu (popup) */
.user-menu {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 8px; right: 8px;
  background: var(--bg-elev-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 4px;
  z-index: 50;
  display: flex; flex-direction: column;
  animation: ef-up .15s ease;
}
.user-menu-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-2);
  text-align: left;
  width: 100%;
  background: transparent; border: 0;
  cursor: pointer;
}
.user-menu-item:hover:not(.disabled):not(:disabled) { background: var(--bg-hover); color: var(--text); }
.user-menu-item.disabled, .user-menu-item:disabled { opacity: 0.45; cursor: not-allowed; }
.user-menu-item svg { flex-shrink: 0; color: var(--text-3); }
.user-menu-item:hover:not(.disabled):not(:disabled) svg { color: var(--text); }
.user-menu-sep { height: 1px; background: var(--line-soft); margin: 4px 4px; }

/* MAIN */
.main { grid-area: main; overflow: hidden; display: flex; min-height: 0; }

/* VAULT 3-PANE */
.vault {
  display: grid;
  grid-template-columns: 380px 1fr;
  width: 100%;
  min-height: 0;
}
.list-pane {
  border-right: 1px solid var(--line-soft);
  display: flex; flex-direction: column;
  min-height: 0;
}
.list-head {
  padding: 14px 16px 10px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--line-soft);
}
.list-head h2 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.list-head .count { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); padding: 2px 6px; border: 1px solid var(--line); border-radius: 4px; }
.list-head .spacer { flex: 1; }

.list-filters {
  display: flex; gap: 6px; padding: 8px 16px;
  border-bottom: 1px solid var(--line-soft);
  overflow-x: auto;
}
.chip {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  font-size: 12px;
  color: var(--text-2);
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
}
.chip:hover { color: var(--text); border-color: var(--text-4); }
.chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.chip .n { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }

.list { overflow: auto; min-height: 0; }
.list-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line-soft);
  cursor: pointer;
  width: 100%;
  text-align: left;
  position: relative;
}
.list-row:hover { background: var(--bg-hover); }
.list-row.active { background: var(--bg-active); }
.list-row.active::before {
  content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
  background: var(--text); border-radius: 0 2px 2px 0;
}
.fav {
  width: 32px; height: 32px; border-radius: 7px;
  background: var(--bg-elev-2);
  border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-weight: 600; font-size: 12px;
  color: var(--text);
  flex-shrink: 0;
  overflow: hidden;
}
.list-row .meta { min-width: 0; }
.list-row .title {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 6px;
}
.list-row .sub {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 2px;
}
.list-row .side { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; color: var(--text-3); font-size: 11px; font-family: var(--font-mono); }

.type-badge {
  font-family: var(--font-mono); font-size: 9px; padding: 1px 5px;
  border: 1px solid var(--line); border-radius: 3px;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em;
}

/* DETAIL */
.detail-pane { overflow: auto; min-height: 0; }
.detail-head {
  padding: 20px 24px 14px;
  border-bottom: 1px solid var(--line-soft);
  display: flex; align-items: flex-start; gap: 14px;
}
.detail-head .fav { width: 44px; height: 44px; border-radius: 9px; font-size: 16px; }
.detail-head h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.015em; }
.detail-head .url { font-family: var(--font-mono); font-size: 12px; color: var(--text-3); margin-top: 4px; display: inline-flex; align-items: center; gap: 6px; }
.detail-head .actions { margin-left: auto; display: flex; gap: 6px; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0 12px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  transition: background .15s, border-color .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn:hover { background: var(--bg-hover); border-color: var(--text-4); }
.btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 600; }
.btn.primary:hover { background: var(--text-2); border-color: var(--text-2); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--text-2); }
.btn.ghost:hover { background: var(--bg-hover); color: var(--text); }
.btn.icon { padding: 0; width: 32px; justify-content: center; }
.btn.sm { height: 26px; padding: 0 10px; font-size: 12px; }
.btn.danger { color: var(--danger); }

.detail-body { padding: 20px 24px 40px; display: flex; flex-direction: column; gap: 24px; }

.field-group { border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; background: var(--bg-elev); }
.field {
  display: grid;
  grid-template-columns: 140px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line-soft);
}
.field:last-child { border-bottom: 0; }
.field .label { font-size: 12px; color: var(--text-3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em; }
.field .value { font-size: 14px; color: var(--text); font-family: var(--font-mono); word-break: break-all; }
.field .value input { background: transparent; border: 0; outline: none; width: 100%; color: var(--text); font-family: var(--font-mono); font-size: 14px; padding: 0; }
.field .tools { display: flex; gap: 4px; color: var(--text-3); }
.field .tools button { width: 26px; height: 26px; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; }
.field .tools button:hover { background: var(--bg-hover); color: var(--text); }
.field .masked { letter-spacing: 0.3em; }

.section-title {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em;
  margin: 0 0 10px 0;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ""; flex: 1; height: 1px; background: var(--line-soft); }

/* Strength meter */
.strength {
  display: flex; flex-direction: column; gap: 10px;
  padding: 16px;
  border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--bg-elev);
}
.strength .row { display: flex; align-items: center; gap: 14px; }
.strength .score { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; font-family: var(--font-mono); }
.strength .bar { flex: 1; height: 6px; background: var(--line-soft); border-radius: 3px; overflow: hidden; position: relative; }
.strength .bar > span { position: absolute; left: 0; top: 0; bottom: 0; background: var(--text); border-radius: 3px; transition: width .3s; }
.strength .bar.weak > span { background: var(--danger); }
.strength .bar.med > span { background: var(--text-3); }
.strength .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); display: flex; gap: 12px; }
.strength .meta b { color: var(--text); font-weight: 500; }

/* TOTP */
.totp {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 16px;
  border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--bg-elev);
}
.totp .code { font-family: var(--font-mono); font-size: 22px; font-weight: 600; letter-spacing: 0.15em; color: var(--text); }
.totp .timer {
  width: 28px; height: 28px; border-radius: 50%;
  background: conic-gradient(var(--text) var(--p), var(--line) 0);
  position: relative;
  transition: background .5s;
}
.totp .timer::after { content: ""; position: absolute; inset: 3px; border-radius: 50%; background: var(--bg-elev); }
.totp .timer span { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: var(--text); z-index: 2; }

/* TAGS */
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 8px;
  font-family: var(--font-mono); font-size: 11px;
  background: var(--bg-elev-2); border: 1px solid var(--line); border-radius: 4px;
  color: var(--text-2);
}
.tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); }

/* Health dashboard */
.health { padding: 28px 32px; overflow: auto; }
.health h1 { margin: 0 0 4px 0; font-size: 28px; font-weight: 600; letter-spacing: -0.025em; }
.health .lede { color: var(--text-3); margin: 0 0 24px 0; font-size: 14px; }

.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat {
  border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 18px;
  background: var(--bg-elev);
  display: flex; flex-direction: column; gap: 6px;
  position: relative; overflow: hidden;
}
.stat .k { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
.stat .v { font-size: 32px; font-weight: 600; letter-spacing: -0.025em; font-family: var(--font-mono); }
.stat .d { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
.stat.hero { grid-column: span 2; background: var(--bg-elev); }
.stat.hero .v { font-size: 56px; }
.stat.hero .big-score { display: flex; align-items: baseline; gap: 8px; }
.stat.hero .big-score small { font-size: 20px; color: var(--text-3); font-family: var(--font-mono); }

.donut {
  --p: 78;
  width: 84px; height: 84px; border-radius: 50%;
  background: conic-gradient(var(--text) calc(var(--p) * 1%), var(--line) 0);
  position: relative;
  flex-shrink: 0;
}
.donut::after {
  content: attr(data-label); position: absolute; inset: 8px; border-radius: 50%;
  background: var(--bg-elev);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-weight: 600; font-size: 18px;
}

.panel {
  border: 1px solid var(--line); border-radius: var(--radius-lg);
  background: var(--bg-elev);
  overflow: hidden;
}
.panel-head { padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line-soft); }
.panel-head h3 { margin: 0; font-size: 14px; font-weight: 600; }
.panel-head .spacer { flex: 1; }
.panel-body { padding: 4px 0; }
.panel-row {
  display: grid; grid-template-columns: 28px 1fr auto auto; gap: 12px; align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 13px;
}
.panel-row:last-child { border-bottom: 0; }
.panel-row:hover { background: var(--bg-hover); }
.panel-row .fav { width: 28px; height: 28px; font-size: 11px; }
.panel-row .sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.sev { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
.sev.crit { background: color-mix(in oklab, var(--danger) 15%, transparent); color: var(--danger); border: 1px solid color-mix(in oklab, var(--danger) 30%, transparent); }
.sev.high { background: var(--bg-elev-2); color: var(--text-2); border: 1px solid var(--line); }
.sev.med { background: var(--bg-elev-2); color: var(--text-2); border: 1px solid var(--line); }
.sev.low { background: var(--bg-elev-2); color: var(--text-3); border: 1px solid var(--line); }

/* Feed */
.feed-item { padding: 14px 16px; border-bottom: 1px solid var(--line-soft); display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: flex-start; }
.feed-item:last-child { border-bottom: 0; }
.feed-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; }
.feed-item .t { font-size: 13px; margin: 0 0 4px; }
.feed-item .m { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }

/* Generator */
.gen-wrap { display: grid; grid-template-columns: 1.3fr 1fr; gap: 0; height: 100%; }
.gen-left { padding: 40px 48px; display: flex; flex-direction: column; gap: 32px; border-right: 1px solid var(--line-soft); overflow: auto; min-width: 0; }
.gen-left h1 { white-space: nowrap; }
.gen-right { padding: 28px 32px; overflow: auto; background: var(--bg-elev); }
.gen-display {
  border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 28px 24px;
  background: var(--bg-elev);
  font-family: var(--font-mono);
  font-size: 32px;
  font-weight: 500;
  letter-spacing: 0.02em;
  word-break: break-all;
  line-height: 1.25;
  min-height: 120px;
  position: relative;
}
.gen-display .char-l { color: var(--text-2); }
.gen-display .char-u { color: var(--text); }
.gen-display .char-n { color: var(--text); font-weight: 700; }
.gen-display .char-s { color: var(--text-3); }

.gen-display .overlay {
  position: absolute; top: 10px; right: 14px;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em;
}

.slider-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line-soft); }
.slider-row:last-child { border-bottom: 0; }
.slider-row .lab { font-size: 13px; color: var(--text-2); }
.slider-row .val { font-family: var(--font-mono); font-size: 16px; color: var(--text); min-width: 40px; text-align: right; }
.slider-row input[type=range] { grid-column: 1 / -1; width: 100%; accent-color: var(--accent); }

.toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.toggle {
  display: flex; align-items: center; gap: 10px; justify-content: space-between;
  padding: 12px 14px;
  border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--bg-elev);
}
.toggle .l { display: flex; flex-direction: column; gap: 2px; }
.toggle .lab { font-size: 13px; }
.toggle .sub { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.switch {
  width: 34px; height: 20px; border-radius: 999px;
  background: var(--line); position: relative; transition: background .2s;
  flex-shrink: 0;
}
.switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--text); transition: transform .2s, background .2s; }
.switch.on { background: var(--text); }
.switch.on::after { transform: translateX(14px); background: var(--bg); }

/* Unlock */
.unlock {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.unlock::before {
  content: ""; position: absolute; inset: 0;
  background-image: linear-gradient(to right, var(--grid) 1px, transparent 1px), linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(600px 400px at 50% 40%, black, transparent 75%);
  pointer-events: none;
}
.unlock-card {
  position: relative; z-index: 1;
  width: 420px;
  padding: 36px 32px;
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background: var(--bg-elev);
  box-shadow: var(--shadow-lg);
}
.unlock-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.unlock-logo .logo { width: 32px; height: 32px; border-radius: 6px; background: var(--text); color: var(--bg); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-weight: 600; font-size: 16px; }
.unlock-card h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.unlock-card .sub { color: var(--text-3); font-size: 13px; margin: 0 0 24px; }
.master-input {
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 48px;
  border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--bg);
  transition: border-color .15s, box-shadow .15s;
}
.master-input.focus { border-color: var(--text); box-shadow: 0 0 0 3px var(--accent-glow); }
.master-input input {
  flex: 1; background: transparent; border: 0; outline: none; color: var(--text);
  font-family: var(--font-mono); font-size: 16px; letter-spacing: 0.18em;
}
.master-input .reveal { color: var(--text-3); }
.unlock-meta { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--text-3); margin-top: 14px; }
.unlock-meta a { color: var(--text-2); }
.unlock-meta a:hover { color: var(--text); }

.biometric {
  display: flex; align-items: center; gap: 10px;
  margin-top: 16px;
  padding: 10px 14px;
  border: 1px dashed var(--line); border-radius: var(--radius);
  color: var(--text-2); font-size: 12px;
}
.biometric .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-2); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }

.unlock-foot { margin-top: 24px; display: flex; gap: 10px; }
.unlock-foot .btn { flex: 1; height: 44px; font-size: 14px; }

/* Command palette */
.cmdk-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  display: flex; align-items: flex-start; justify-content: center; padding-top: 12vh;
  z-index: 100;
  animation: fadeIn .15s ease-out;
}
[data-theme="light"] .cmdk-backdrop { background: rgba(180,180,170,0.4); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.cmdk {
  width: 620px; max-width: 90vw;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: slideDown .2s ease-out;
}
@keyframes slideDown { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.cmdk-input {
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px; height: 52px;
  border-bottom: 1px solid var(--line-soft);
}
.cmdk-input input {
  flex: 1; background: transparent; border: 0; outline: none;
  font-size: 15px; color: var(--text);
}
.cmdk-input .kbd { opacity: 0.7; }
.cmdk-list { max-height: 420px; overflow: auto; padding: 6px; }
.cmdk-section { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 10px 4px; }
.cmdk-item {
  display: grid; grid-template-columns: 24px 1fr auto; gap: 12px; align-items: center;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text-2); font-size: 13px; width: 100%; text-align: left;
}
.cmdk-item:hover, .cmdk-item.sel { background: var(--bg-hover); color: var(--text); }
.cmdk-item .cmeta { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--text);
  color: var(--bg);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  display: flex; align-items: center; gap: 10px;
  z-index: 200;
  animation: toastIn .2s ease-out;
  box-shadow: var(--shadow-lg);
}
@keyframes toastIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Tweaks panel */
.tweaks-toggle {
  position: fixed; bottom: 20px; right: 20px;
  z-index: 300;
  background: var(--bg-elev); border: 1px solid var(--line); border-radius: 999px;
  padding: 8px 14px; font-size: 12px; font-family: var(--font-mono); color: var(--text-2);
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow-md);
}
.tweaks-toggle:hover { color: var(--text); }
.tweaks-panel {
  position: fixed; bottom: 20px; right: 20px;
  z-index: 300;
  width: 300px;
  background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.tweaks-head { padding: 12px 14px; border-bottom: 1px solid var(--line-soft); display: flex; align-items: center; gap: 10px; }
.tweaks-head h4 { margin: 0; font-size: 13px; font-weight: 600; }
.tweaks-head .spacer { flex: 1; }
.tweaks-body { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 12px; }
.tw-row { display: flex; flex-direction: column; gap: 6px; }
.tw-row .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
.tw-seg { display: flex; border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; background: var(--bg); }
.tw-seg button { flex: 1; height: 30px; font-size: 12px; color: var(--text-2); }
.tw-seg button.on { background: var(--text); color: var(--bg); }
.tw-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
.tw-swatch { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--line); cursor: pointer; }
.tw-swatch.on { outline: 2px solid var(--text); outline-offset: 2px; }

/* Scrollbar */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; border: 2px solid var(--bg); }
*::-webkit-scrollbar-thumb:hover { background: var(--text-4); }

/* Empty state (for placeholder views) */
.empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-3); font-family: var(--font-mono); font-size: 12px; }

/* Grid texture behind unlock background-image set above */

/* ===== MAIN flex override ===== */
.main { overflow: auto; flex-direction: column; }
.main > .travel-banner { margin: 12px 16px 0; }
.main > .vault, .main > .health, .main > .generator { flex: 1; min-height: 0; }

/* ===== TRAVEL MODE ===== */
.travel-sb {
  margin: 10px 12px 6px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px 12px;
  background: var(--bg-elev);
  display: flex; flex-direction: column; gap: 8px;
  position: relative; overflow: hidden;
  transition: border-color .2s, background .2s;
}
.travel-sb.on {
  border-color: color-mix(in oklab, var(--accent) 55%, var(--line));
  background: color-mix(in oklab, var(--accent) 10%, var(--bg-elev));
}
.travel-sb .row { display: flex; align-items: center; gap: 8px; }
.travel-sb .ttl { font-size: 12px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
.travel-sb .ttl .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent); animation: tpulse 1.8s ease-out infinite; }
@keyframes tpulse { 0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent); } 70% { box-shadow: 0 0 0 8px color-mix(in oklab, var(--accent) 0%, transparent); } }
.travel-sb .sub { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.travel-switch {
  --w: 34px; --h: 18px;
  width: var(--w); height: var(--h); flex-shrink: 0;
  border: 1px solid var(--line); border-radius: 999px; background: var(--bg); position: relative;
  cursor: pointer; margin-left: auto;
  transition: background .15s, border-color .15s;
}
.travel-switch::after {
  content: ''; position: absolute; top: 1px; left: 1px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--text-2); transition: transform .18s cubic-bezier(.4,.8,.4,1.2), background .15s;
}
.travel-switch.on { background: var(--accent); border-color: var(--accent); }
.travel-switch.on::after { transform: translateX(16px); background: var(--accent-ink); }

.travel-banner {
  grid-column: 1 / -1;
  margin: 0 16px 12px 16px;
  padding: 10px 14px;
  border: 1px solid color-mix(in oklab, var(--accent) 50%, var(--line));
  background: color-mix(in oklab, var(--accent) 8%, var(--bg-elev));
  border-radius: var(--radius);
  display: flex; align-items: center; gap: 12px;
  font-size: 13px;
}
.travel-banner .icon { color: var(--accent); display: inline-flex; }
.travel-banner b { color: var(--text); }
.travel-banner .spacer { flex: 1; }
.travel-banner .btn { height: 28px; font-size: 12px; }

.travel-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 7px; border-radius: 999px;
  font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.04em;
  border: 1px solid var(--line); color: var(--text-3);
}
.travel-pill.safe { color: var(--accent); background: color-mix(in oklab, var(--accent) 15%, var(--bg-elev)); border-color: color-mix(in oklab, var(--accent) 30%, var(--line)); }
.travel-pill.hidden { color: var(--text-3); }
.travel-pill .d { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ===== HISTORY TIMELINE ===== */
.timeline { position: relative; padding-left: 6px; }
.timeline::before {
  content: ''; position: absolute; left: 12px; top: 10px; bottom: 10px;
  width: 1px; background: var(--line);
}
.tl-tabs {
  display: flex; gap: 4px; margin-bottom: 14px;
  border-bottom: 1px solid var(--line-soft);
}
.tl-tabs button {
  padding: 7px 10px; font-size: 12px; color: var(--text-3);
  border-bottom: 1px solid transparent; margin-bottom: -1px;
  display: inline-flex; align-items: center; gap: 6px;
}
.tl-tabs button:hover { color: var(--text-2); }
.tl-tabs button.on { color: var(--text); border-bottom-color: var(--text); }
.tl-tabs button .c { font-family: var(--font-mono); font-size: 10px; color: var(--text-4); }
.tl-tabs button.on .c { color: var(--text-3); }

.tl-item {
  position: relative;
  padding: 10px 0 14px 32px;
  display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
}
.tl-item .node {
  position: absolute; left: 6px; top: 12px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--bg);
  border: 1.5px solid var(--text-3);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  z-index: 1;
}
.tl-item.kind-password .node, .tl-item.kind-created .node {
  border-color: var(--accent); color: var(--accent-ink); background: var(--accent);
}
.tl-item.kind-shared .node { border-color: var(--text); color: var(--text); }
.tl-item .tl-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.tl-item .tl-kind { font-size: 13px; font-weight: 500; color: var(--text); }
.tl-item .tl-time { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); white-space: nowrap; }
.tl-item .tl-who { font-size: 12px; color: var(--text-2); grid-column: 1 / -1; }
.tl-item .tl-who .sep { color: var(--text-4); margin: 0 6px; }
.tl-item .tl-detail { grid-column: 1 / -1; font-family: var(--font-mono); font-size: 11px; color: var(--text-3); padding: 4px 10px; border: 1px solid var(--line-soft); border-radius: 6px; background: var(--bg-elev); margin-top: 2px; display: inline-block; justify-self: start; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.tl-more { margin-top: 6px; padding: 8px 12px; font-size: 12px; color: var(--text-3); border: 1px dashed var(--line); border-radius: var(--radius); width: 100%; }
.tl-more:hover { color: var(--text); border-color: var(--text-4); }

/* ===== BREACH FEED (enhanced) ===== */
.breach-feed { display: flex; flex-direction: column; gap: 10px; padding: 10px 14px; }
.breach-row {
  border: 1px solid var(--line-soft);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 3px 1fr auto;
  gap: 0 14px;
  background: var(--bg-elev);
  align-items: start;
  position: relative;
}
.breach-row.sev-crit { border-color: color-mix(in oklab, var(--danger) 45%, var(--line)); background: color-mix(in oklab, var(--danger) 4%, var(--bg-elev)); }
.breach-row.sev-high { border-color: color-mix(in oklab, var(--warn) 35%, var(--line)); }
.breach-row .sev-stripe { width: 3px; border-radius: 2px; align-self: stretch; background: var(--line); }
.breach-row.sev-crit .sev-stripe { background: var(--danger); }
.breach-row.sev-high .sev-stripe { background: var(--warn); }
.breach-row.sev-med .sev-stripe { background: var(--text-3); }
.breach-row.status-resolved { opacity: .65; }
.breach-row .br-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
.breach-row .br-name { font-family: var(--font-mono); font-size: 13px; color: var(--text); font-weight: 500; }
.breach-row .br-date { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.breach-row .br-sum { font-size: 12px; color: var(--text-2); margin-top: 6px; line-height: 1.5; }
.breach-row .br-meta { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
.breach-row .br-meta .k { color: var(--text-4); margin-right: 4px; }
.breach-row .br-meta .v { color: var(--text-2); }
.breach-row .br-chips { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.breach-row .br-chip { font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--bg); border: 1px solid var(--line); color: var(--text-2); }
.breach-row .br-side { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.br-status {
  font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid var(--line);
}
.br-status.new { background: var(--danger); color: #fff; border-color: var(--danger); }
.br-status.open { background: color-mix(in oklab, var(--warn) 20%, var(--bg)); color: var(--warn); border-color: color-mix(in oklab, var(--warn) 40%, var(--line)); }
.br-status.clear { color: var(--text-3); }
.br-status.resolved { color: var(--text-3); text-decoration: line-through; text-decoration-thickness: 1px; }

.breach-match {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px; color: var(--danger);
  padding: 2px 7px; border-radius: 4px;
  background: color-mix(in oklab, var(--danger) 10%, transparent);
  border: 1px solid color-mix(in oklab, var(--danger) 30%, var(--line));
}

/* ===== CUSTOM FIELDS (detail) ===== */
.cf-bool {
  width: 18px; height: 18px; border-radius: 5px;
  border: 1px solid var(--line);
  background: var(--bg);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-3);
}
.cf-bool.on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

/* ===== EDIT MODAL ===== */
.ef-backdrop {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  animation: ef-fade .15s ease;
}
[data-theme="light"] .ef-backdrop { background: rgba(0,0,0,0.30); }
@keyframes ef-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes ef-up   { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: none; } }

.ef-modal {
  width: 640px; max-width: 92vw; max-height: 88vh;
  background: var(--bg-elev-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  animation: ef-up .2s ease;
  overflow: hidden;
}
.ef-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
}
.ef-head h3 { margin: 0; font-size: 15px; font-weight: 600; }
.ef-close {
  width: 28px; height: 28px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-3);
}
.ef-close:hover { background: var(--bg-hover); color: var(--text); }

.ef-body {
  padding: 16px 20px;
  overflow-y: auto; flex: 1;
  display: flex; flex-direction: column; gap: 18px;
}
.ef-body section { display: flex; flex-direction: column; gap: 10px; }

.ef-sec {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em;
  margin: 0; font-weight: 500;
}
.ef-sec-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.ef-add-group { display: flex; gap: 4px; flex-wrap: wrap; }

.ef-row.col { display: flex; flex-direction: column; gap: 6px; }
.ef-lbl {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em;
}
.ef-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
.ef-fields .ef-row.col:has(textarea) { grid-column: 1 / -1; }

.ef-modal input[type="text"],
.ef-modal input[type="password"],
.ef-modal textarea,
.ef-modal select {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 13px;
  outline: none;
  transition: border-color .12s;
}
.ef-modal input.mono, .ef-modal textarea.mono { font-family: var(--font-mono); }
.ef-modal textarea { resize: vertical; min-height: 60px; }
.ef-modal input:focus,
.ef-modal textarea:focus,
.ef-modal select:focus { border-color: var(--text-3); }

.ef-empty {
  padding: 14px;
  border: 1px dashed var(--line);
  border-radius: var(--radius-sm);
  font-size: 12px; color: var(--text-3);
  text-align: center;
}
.ef-hint { font-size: 12px; color: var(--text-3); }

.cf-list { display: flex; flex-direction: column; gap: 8px; }
.cf-edit {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  background: var(--bg-elev);
  display: flex; flex-direction: column; gap: 8px;
}
.cf-edit-head { display: grid; grid-template-columns: 110px 1fr auto; gap: 8px; align-items: center; }
.cf-edit-head .cf-type { font-family: var(--font-mono); font-size: 12px; }
.cf-edit-head .cf-name { font-size: 13px; }
.cf-edit-head .cf-del {
  width: 28px; height: 28px; border-radius: 5px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-3);
}
.cf-edit-head .cf-del:hover { background: var(--bg-hover); color: var(--danger); }
.cf-edit-body input[type="text"],
.cf-edit-body input[type="password"],
.cf-edit-body select { font-size: 13px; }

.ef-switch {
  width: 36px; height: 20px;
  border: 1px solid var(--line); border-radius: 999px;
  background: var(--bg); position: relative;
  cursor: pointer; transition: background .15s, border-color .15s;
}
.ef-switch::after {
  content: ''; position: absolute; top: 1px; left: 1px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--text-2); transition: transform .18s cubic-bezier(.4,.8,.4,1.2), background .15s;
}
.ef-switch.on { background: var(--accent); border-color: var(--accent); }
.ef-switch.on::after { transform: translateX(16px); background: var(--accent-ink); }

.ef-foot {
  padding: 12px 18px;
  border-top: 1px solid var(--line);
  display: flex; gap: 8px; justify-content: flex-end;
  background: var(--bg-elev);
}

/* btn 在已有定义上仅补充 disabled 视觉 */
.ef-add-group .btn[disabled] { opacity: .4; cursor: not-allowed; }

/* ===== IMPORT MODAL ===== */
.imp-modal { width: 680px; }
.imp-modal .ef-foot .btn[disabled] { opacity: .4; cursor: not-allowed; }
.imp-mute { color: var(--text-3); }

.imp-formats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.imp-fmt {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--bg-elev);
  cursor: pointer;
  transition: border-color .12s, background .12s;
}
.imp-fmt:hover:not(.disabled) { border-color: var(--text-4); }
.imp-fmt.on { border-color: var(--text); background: var(--bg-active); }
.imp-fmt.disabled { opacity: .5; cursor: not-allowed; }
.imp-fmt input[type="radio"] { accent-color: var(--accent); margin-top: 3px; flex-shrink: 0; }
.imp-fmt-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.imp-fmt-name { font-size: 13px; font-weight: 500; color: var(--text); }
.imp-fmt-hint { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); line-height: 1.4; }

.imp-drop {
  border: 1px dashed var(--line);
  border-radius: var(--radius);
  padding: 18px 16px;
  background: var(--bg-elev);
  display: grid; grid-template-columns: auto 1fr auto; gap: 14px;
  align-items: center;
  transition: border-color .12s, background .12s;
}
.imp-drop.drag { border-color: var(--text); background: var(--bg-active); }
.imp-drop.ok { border-color: color-mix(in oklab, var(--ok) 40%, var(--line)); }
.imp-drop.err { border-color: color-mix(in oklab, var(--danger) 50%, var(--line)); }
.imp-drop-icon {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  background: var(--bg-elev-2); border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2);
}
.imp-drop-text { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0; }
.imp-drop-hint { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.imp-drop-file {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-2);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-align: right;
}
.imp-err {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px; padding: 8px 10px;
  font-size: 12px; color: var(--danger);
  border: 1px solid color-mix(in oklab, var(--danger) 35%, var(--line));
  background: color-mix(in oklab, var(--danger) 6%, var(--bg-elev));
  border-radius: var(--radius-sm);
}

.imp-summary { font-size: 13px; color: var(--text); margin-bottom: 8px; }
.imp-stats { display: flex; flex-wrap: wrap; gap: 6px; }
.imp-stat {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 11px;
  padding: 3px 8px; border-radius: 4px;
  background: var(--bg-elev-2); border: 1px solid var(--line);
  color: var(--text-2);
}
.imp-stat b { color: var(--text); font-weight: 600; }
.imp-stat.warn { color: var(--warn); border-color: color-mix(in oklab, var(--warn) 35%, var(--line)); }
.imp-stat.warn b { color: var(--warn); }
.imp-warn {
  margin-top: 8px; padding: 8px 10px;
  font-size: 12px; color: var(--warn);
  border: 1px solid color-mix(in oklab, var(--warn) 30%, var(--line));
  background: color-mix(in oklab, var(--warn) 6%, var(--bg-elev));
  border-radius: var(--radius-sm);
}

.imp-preview {
  border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--bg-elev);
  overflow: hidden;
}
.imp-prev-row {
  display: grid; grid-template-columns: 80px 1fr 1fr; gap: 12px;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 12px;
}
.imp-prev-row:last-child { border-bottom: 0; }
.imp-prev-type {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 1px 6px; border: 1px solid var(--line); border-radius: 3px;
  display: inline-block; width: fit-content;
}
.imp-prev-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.imp-prev-sub { font-family: var(--font-mono); color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.imp-strategy { display: flex; flex-direction: column; gap: 6px; }
.imp-strategy label {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-2);
  cursor: pointer; padding: 4px 0;
}
.imp-strategy label input[type="radio"] { accent-color: var(--accent); }
.imp-strategy label:hover { color: var(--text); }

</style>
</head>
