<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1200"/>
<title>ZPass Mobile — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #e8e6e0; font-family: "Geist", system-ui, sans-serif; color: #141416; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  /* Hide scrollbars inside phone mockups — keep scrollability */
  .zp-phone *::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .zp-phone * { scrollbar-width: none; -ms-overflow-style: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/i18n.jsx"></script>
<script type="text/babel" src="src/mobile/zp-shared.jsx"></script>
<script type="text/babel" src="src/mobile/zp-unlock.jsx"></script>
<script type="text/babel" src="src/mobile/zp-vault.jsx"></script>
<script type="text/babel" src="src/mobile/zp-detail.jsx"></script>
<script type="text/babel" src="src/mobile/zp-totp.jsx"></script>
<script type="text/babel" src="src/mobile/zp-generator.jsx"></script>
<script type="text/babel" src="src/mobile/zp-security.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;
const ZPI18n = window.ZPASS_I18N;

Object.keys(MOBILE_STRINGS).forEach(lang => {
  Object.assign(ZPI18n.STRINGS[lang], MOBILE_STRINGS[lang]);
});

const DATA_ITEMS = window.ZPASS_DATA.ITEMS;
const DATA_FAV = window.ZPASS_DATA.FAVICONS;

function daysLbl(ms, lang='en') {
  const d = Math.floor((Date.now() - ms) / (24*3600*1000));
  if (lang === 'zh') {
    if (d === 0) return '今天';
    if (d < 30) return `${d}天前`;
    if (d < 365) return `${Math.floor(d/30)}月前`;
    return `${Math.floor(d/365)}年前`;
  }
  if (d === 0) return 'today';
  if (d < 30) return `${d}d`;
  if (d < 365) return `${Math.floor(d/30)}mo`;
  return `${Math.floor(d/365)}y`;
}

function enrichLogin(items, lang) {
  return items.filter(i => i.type === 'login').map(it => ({
    ...it,
    favT: DATA_FAV[it.fav]?.t || it.name.slice(0,2).toUpperCase(),
    modifiedLbl: daysLbl(it.modified, lang),
  }));
}

// ─────────────────────────────────────────────────────────
// Tweaks — persisted via EDITMODE block
// ─────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "lang": "zh",
  "platform": "ios",
  "vaultStyle": "dashboard",
  "unlockStyle": "faceid",
  "density": "comfy"
}/*EDITMODE-END*/;

// ─────────────────────────────────────────────────────────
// Phone bezel
// ─────────────────────────────────────────────────────────
function PhoneShell({ children, platform = 'ios', theme = 'dark' }) {
  const c = ZP_TOKENS[theme];
  const r = platform === 'ios' ? 50 : 36;
  return (
    <div className="zp-phone" style={{
      width: 390, height: 844, borderRadius: r, overflow: 'hidden',
      background: c.bg, color: c.text, position: 'relative',
      boxShadow: '0 0 0 9px #1a1a1c, 0 0 0 10px rgba(0,0,0,0.4), 0 50px 90px rgba(0,0,0,0.22), 0 15px 30px rgba(0,0,0,0.12)',
      fontFamily: ZP_FONTS.sans, WebkitFontSmoothing: 'antialiased',
      flexShrink: 0,
    }}>
      {/* side buttons — subtle */}
      <div style={{ position: 'absolute', left: -14, top: 110, width: 4, height: 32, background: '#0d0d0e', borderRadius: 2 }}/>
      <div style={{ position: 'absolute', left: -14, top: 170, width: 4, height: 50, background: '#0d0d0e', borderRadius: 2 }}/>
      <div style={{ position: 'absolute', left: -14, top: 230, width: 4, height: 50, background: '#0d0d0e', borderRadius: 2 }}/>
      <div style={{ position: 'absolute', right: -14, top: 170, width: 4, height: 80, background: '#0d0d0e', borderRadius: 2 }}/>
      {children}
    </div>
  );
}

// Toast
function Toast({ msg, show }) {
  return (
    <div style={{
      position: 'absolute', left: '50%', bottom: 100, transform: `translateX(-50%) translateY(${show ? 0 : 20}px)`,
      padding: '10px 16px', background: '#141416', color: '#f5f5f3', borderRadius: 8,
      fontFamily: ZP_FONTS.mono, fontSize: 12, letterSpacing: 0.02,
      opacity: show ? 1 : 0, transition: 'all .2s', pointerEvents: 'none', zIndex: 100,
      border: '1px solid rgba(255,255,255,0.1)',
      boxShadow: '0 8px 24px rgba(0,0,0,0.3)',
    }}>{msg}</div>
  );
}

// ─────────────────────────────────────────────────────────
// Root App
// ─────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  // Persist selected screen in localStorage
  const [screen, setScreenState] = useState(() => localStorage.getItem('zp_mob_screen') || 'unlock');
  const setScreen = (s) => { setScreenState(s); localStorage.setItem('zp_mob_screen', s); };

  const [tab, setTab] = useState('vault');
  const [activeItemId, setActiveItemId] = useState('i1');
  const [toast, setToast] = useState(null);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 1800);
  };

  // Edit mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  return (
    <ZPI18n.I18nProvider lang={tweaks.lang} setLang={l => setTweak('lang', l)}>
      <Stage
        tweaks={tweaks}
        setTweak={setTweak}
        screen={screen} setScreen={setScreen}
        tab={tab} setTab={setTab}
        activeItemId={activeItemId} setActiveItemId={setActiveItemId}
        toast={toast} showToast={showToast}
        editMode={editMode}
      />
    </ZPI18n.I18nProvider>
  );
}

function Stage({ tweaks, setTweak, screen, setScreen, tab, setTab, activeItemId, setActiveItemId, toast, showToast, editMode }) {
  const { t, lang } = ZPI18n.useI18n();
  const theme = tweaks.theme;
  const platform = tweaks.platform;
  const items = useMemo(() => enrichLogin(DATA_ITEMS, lang), [lang]);
  const totpItems = items.filter(i => i.totp);
  const active = items.find(i => i.id === activeItemId) || items[0];

  // Wire up tabs → screens
  const goToTab = (tb) => {
    setTab(tb);
    if (tb === 'vault') setScreen('vault');
    else if (tb === 'gen') setScreen('generator');
    else if (tb === 'security') setScreen('security');
    else if (tb === 'settings') setScreen('settings');
    else if (tb === 'scan') showToast(lang === 'zh' ? '新建条目…' : 'New item…');
  };

  // Navigation to detail
  const openItem = (id) => {
    setActiveItemId(id);
    setScreen('detail');
  };

  return (
    <div style={{
      minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '40px 0 40px', position: 'relative',
      background: `
        radial-gradient(1200px 800px at 20% 30%, rgba(255,240,210,0.5), transparent 70%),
        radial-gradient(1200px 800px at 80% 70%, rgba(210,220,245,0.35), transparent 70%),
        #e8e6e0
      `,
    }}>
      {/* header */}
      <div style={{
        position: 'fixed', top: 0, left: 0, right: 0, zIndex: 50,
        display: 'flex', alignItems: 'center', gap: 12,
        padding: '12px 20px',
        background: 'rgba(255,255,255,0.72)',
        backdropFilter: 'blur(16px)',
        borderBottom: '1px solid rgba(0,0,0,0.06)',
      }}>
        <div style={{
          width: 26, height: 26, borderRadius: 6, background: '#141416', color: '#fff',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: ZP_FONTS.mono, fontWeight: 700, fontSize: 13,
        }}>Z</div>
        <div>
          <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: -0.01 }}>ZPass · Mobile</div>
          <div style={{ fontSize: 11, fontFamily: ZP_FONTS.mono, color: '#77777c' }}>{lang === 'zh' ? '可点击原型' : 'Clickable prototype'} · {platform} · {theme}</div>
        </div>
        <div style={{ flex: 1 }}/>
        <a href="ZPass-Mobile-Canvas.html" style={{
          fontSize: 12, fontFamily: ZP_FONTS.mono, padding: '6px 11px',
          border: '1px solid rgba(0,0,0,0.12)', borderRadius: 6, color: '#141416',
          textDecoration: 'none', background: 'rgba(255,255,255,0.5)',
        }}>← {lang === 'zh' ? '设计画布' : 'Design canvas'}</a>
      </div>

      {/* left scene selector */}
      <div style={{
        position: 'fixed', left: 20, top: 80, bottom: 20, width: 200,
        background: 'rgba(255,255,255,0.7)', backdropFilter: 'blur(16px)',
        border: '1px solid rgba(0,0,0,0.06)', borderRadius: 12,
        padding: 12, display: 'flex', flexDirection: 'column', gap: 4,
        overflowY: 'auto',
      }}>
        <div style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, textTransform: 'uppercase', letterSpacing: 0.08, color: '#77777c', padding: '4px 8px 8px' }}>{lang === 'zh' ? '场景' : 'Scenes'}</div>
        {[
          { id: 'unlock',    label: lang === 'zh' ? '解锁' : 'Unlock' },
          { id: 'vault',     label: lang === 'zh' ? '保险库' : 'Vault' },
          { id: 'detail',    label: lang === 'zh' ? '条目详情' : 'Item detail' },
          { id: 'totp',      label: lang === 'zh' ? 'TOTP 查看器' : 'TOTP viewer' },
          { id: 'generator', label: lang === 'zh' ? '密码生成器' : 'Generator' },
          { id: 'security',  label: lang === 'zh' ? '安全概览' : 'Security' },
        ].map(s => (
          <button key={s.id} onClick={() => setScreen(s.id)} style={{
            padding: '8px 10px', textAlign: 'left', border: 0, borderRadius: 6,
            background: screen === s.id ? '#141416' : 'transparent',
            color: screen === s.id ? '#f5f5f3' : '#141416',
            fontSize: 13, cursor: 'pointer',
          }}>{s.label}</button>
        ))}

        <div style={{ height: 1, background: 'rgba(0,0,0,0.08)', margin: '12px 4px' }}/>

        <div style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, textTransform: 'uppercase', letterSpacing: 0.08, color: '#77777c', padding: '4px 8px 8px' }}>{lang === 'zh' ? '提示' : 'Hints'}</div>
        <div style={{ padding: '0 8px', fontSize: 12, color: '#4a4a4e', lineHeight: 1.5 }}>
          {lang === 'zh' ? '点击条目打开详情 · 点击下方标签切换 · TOTP 环在实时倒计时' : 'Tap an item to open detail. Tap bottom tabs. TOTP ring counts down live.'}
        </div>
      </div>

      {/* phone */}
      <div style={{ position: 'relative', marginLeft: 120 }}>
        <PhoneShell platform={platform} theme={theme}>
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
            <ZPStatusBar theme={theme} platform={platform}/>
            <div style={{ flex: 1, minHeight: 0, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
              <ScreenRouter
                screen={screen} setScreen={setScreen}
                tweaks={tweaks} setTweak={setTweak}
                t={t} lang={lang}
                items={items} totpItems={totpItems} active={active}
                openItem={openItem} showToast={showToast}
              />
            </div>
            {['vault','generator','security','settings'].includes(screen) && (
              <ZPTabBar tab={tab} setTab={goToTab} t={t} theme={theme} platform={platform}/>
            )}
            {platform === 'ios' ? <ZPHomeIndicator theme={theme}/> : <ZPGestureBar theme={theme}/>}
          </div>
          <Toast msg={toast} show={!!toast}/>
        </PhoneShell>
      </div>

      {/* Tweaks panel */}
      {editMode && (
        <div style={{
          position: 'fixed', right: 20, bottom: 20, width: 280,
          background: 'rgba(20,20,22,0.96)', color: '#f5f5f3',
          backdropFilter: 'blur(16px)', border: '1px solid rgba(255,255,255,0.1)',
          borderRadius: 12, padding: 16, zIndex: 100,
          fontFamily: ZP_FONTS.sans,
          boxShadow: '0 20px 50px rgba(0,0,0,0.35)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: '#ececec' }}/>
            <span style={{ fontWeight: 600, fontSize: 14 }}>Tweaks</span>
            <span style={{ flex: 1 }}/>
            <span style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, color: '#a8a8ac', textTransform: 'uppercase', letterSpacing: 0.08 }}>zpass · mobile</span>
          </div>
          {[
            { k: 'theme', label: 'Theme', opts: [['dark','Dark'],['light','Light']] },
            { k: 'lang', label: 'Language', opts: [['en','English'],['zh','中文']] },
            { k: 'platform', label: 'Platform', opts: [['ios','iOS'],['android','Android']] },
            { k: 'vaultStyle', label: 'Vault style', opts: [['dense','Dense'],['cards','Cards'],['dashboard','Dashboard']] },
            { k: 'unlockStyle', label: 'Unlock style', opts: [['faceid','Biometric'],['pin','Master PIN']] },
          ].map(tw => (
            <div key={tw.k} style={{ marginBottom: 10 }}>
              <div style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, color: '#a8a8ac', textTransform: 'uppercase', letterSpacing: 0.06, marginBottom: 5 }}>{tw.label}</div>
              <div style={{ display: 'flex', borderRadius: 6, overflow: 'hidden', border: '1px solid rgba(255,255,255,0.1)' }}>
                {tw.opts.map(([v, l]) => (
                  <button key={v} onClick={() => setTweak(tw.k, v)} style={{
                    flex: 1, padding: '6px 4px', border: 0, cursor: 'pointer',
                    background: tweaks[tw.k] === v ? '#f5f5f3' : 'transparent',
                    color: tweaks[tw.k] === v ? '#141416' : '#ececec',
                    fontSize: 11, fontFamily: ZP_FONTS.sans,
                  }}>{l}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// Router — picks the right screen component
// ─────────────────────────────────────────────────────────
function ScreenRouter({ screen, setScreen, tweaks, setTweak, t, lang, items, totpItems, active, openItem, showToast }) {
  const theme = tweaks.theme;
  const platform = tweaks.platform;

  if (screen === 'unlock') {
    return tweaks.unlockStyle === 'pin'
      ? <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }} onClick={() => setScreen('vault')}>
          <ZPUnlockPIN theme={theme} t={t} platform={platform}/>
        </div>
      : <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }} onClick={() => setScreen('vault')}>
          <ZPUnlockFaceID theme={theme} t={t} platform={platform}/>
        </div>;
  }

  if (screen === 'vault') {
    const vp = tweaks.vaultStyle;
    const withTap = (children) => (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
        {children}
      </div>
    );
    if (vp === 'dense') {
      return withTap(<ZPVaultDense theme={theme} t={t} items={items} activeId={active.id} onSelect={openItem}/>);
    }
    if (vp === 'cards') {
      return withTap(<ClickableCards theme={theme} t={t} items={items} onOpen={openItem}/>);
    }
    return withTap(<ClickableDashboard theme={theme} t={t} items={items} onOpen={openItem} onBreach={() => setScreen('security')}/>);
  }

  if (screen === 'detail') {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
        <ClickableDetail theme={theme} t={t} item={active} onBack={() => setScreen('vault')} onCopy={showToast} lang={lang}/>
      </div>
    );
  }

  if (screen === 'totp') {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
        <LiveTotp theme={theme} t={t} items={totpItems} onCopy={showToast} lang={lang}/>
      </div>
    );
  }

  if (screen === 'generator') {
    return <ZPGenerator theme={theme} t={t}/>;
  }

  if (screen === 'security') {
    return <ZPSecurity theme={theme} t={t}/>;
  }

  if (screen === 'settings') {
    return <SettingsStub theme={theme} t={t} lang={lang}/>;
  }
  return null;
}

// ─────────────────────────────────────────────────────────
// Clickable Dashboard — wires breach + items
// ─────────────────────────────────────────────────────────
function ClickableDashboard({ theme, t, items, onOpen, onBreach }) {
  const c = ZP_TOKENS[theme];
  const pinned = items.slice(0, 4);
  const recent = items.slice(0, 6);
  const breachCount = 3;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: 0, flex: 1 }}>
      <ZPVaultHeader theme={theme} t={t} title={t('vault_title')} count={items.length}/>
      <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 20 }}>
        <button onClick={onBreach} style={{
          margin: '6px 20px 12px', padding: '12px 14px',
          border: `1px solid color-mix(in oklab, ${c.danger} 35%, ${c.line})`,
          background: `color-mix(in oklab, ${c.danger} 6%, ${c.bgElev})`,
          borderRadius: 10, display: 'flex', alignItems: 'center', gap: 12,
          width: 'calc(100% - 40px)', color: c.text, textAlign: 'left', cursor: 'pointer',
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: 8,
            background: `color-mix(in oklab, ${c.danger} 20%, transparent)`,
            color: c.danger, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          }}><IconAlert size={18}/></div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 500 }}>{t('mob_breach_strip', breachCount)}</div>
            <div style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, color: c.text3, marginTop: 2 }}>HIBP · linear · twitter · notion</div>
          </div>
          <span style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, color: c.text2 }}>→</span>
        </button>

        <ZPSectionHeader theme={theme}>{t('mob_pinned')}</ZPSectionHeader>
        <div style={{ padding: '0 20px', display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
          {pinned.map(it => (
            <button key={it.id} onClick={() => onOpen(it.id)} style={{
              padding: 12, border: `1px solid ${c.line}`, borderRadius: 10,
              background: c.bgElev, display: 'flex', flexDirection: 'column', gap: 8,
              color: c.text, textAlign: 'left', cursor: 'pointer',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <ZPFav t={it.favT} theme={theme} size={28}/>
                <span style={{ fontSize: 13, fontWeight: 500, flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.name}</span>
              </div>
              <div style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, color: c.text3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.username}</div>
            </button>
          ))}
        </div>

        <ZPSectionHeader theme={theme}>{t('mob_recent')}</ZPSectionHeader>
        <div>
          {recent.map(it => (
            <button key={it.id} onClick={() => onOpen(it.id)} style={{
              display: 'grid', gridTemplateColumns: '32px 1fr auto', gap: 12,
              alignItems: 'center', padding: '10px 20px', width: '100%',
              borderBottom: `1px solid ${c.lineSoft}`, border: 0, borderTop: 0,
              background: 'transparent', color: c.text, textAlign: 'left', cursor: 'pointer',
            }}>
              <ZPFav t={it.favT} theme={theme} size={32}/>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 14 }}>{it.name}</div>
                <div style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, color: c.text3 }}>{it.username}</div>
              </div>
              <div style={{ fontFamily: ZP_FONTS.mono, fontSize: 10, color: c.text3 }}>{it.modifiedLbl}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// Clickable Cards — each card → detail
function ClickableCards({ theme, t, items, onOpen }) {
  const c = ZP_TOKENS[theme];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: 0, flex: 1 }}>
      <ZPVaultHeader theme={theme} t={t} title={t('vault_title')} count={items.length}/>
      <ZPFilterChips theme={theme} t={t}/>
      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 16px 16px', display: 'flex', flexDirection: 'column', gap: 8 }}>
        {items.map((it) => (
          <button key={it.id} onClick={() => onOpen(it.id)} style={{
            background: c.bgElev, border: `1px solid ${c.line}`, borderRadius: 10,
            padding: '14px 14px', display: 'grid', gridTemplateColumns: '40px 1fr auto', gap: 12,
            alignItems: 'center', color: c.text, textAlign: 'left', cursor: 'pointer', width: '100%',
          }}>
            <ZPFav t={it.favT} theme={theme} size={40}/>
            <div style={{ minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ fontSize: 15, fontWeight: 500 }}>{it.name}</span>
                {it.totp && <ZPTypeBadge theme={theme}>totp</ZPTypeBadge>}
              </div>

// Small live ring (counts down 30s)
function LiveRing({ theme, size = 32, stroke = 3 }) {
  const c = ZP_TOKENS[theme];
  const [t, setT] = React.useState(() => 30 - (Math.floor(Date.now()/1000) % 30));
  React.useEffect(() => {
    const id = setInterval(() => setT(30 - (Math.floor(Date.now()/1000) % 30)), 500);
    return () => clearInterval(id);
  }, []);
  const r = size/2 - stroke;
  const circ = 2 * Math.PI * r;
  const pct = t / 30;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c.lineSoft} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c.text} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)} strokeLinecap="round"
          style={{ transition: 'stroke-dashoffset .5s linear' }}/>
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: ZP_FONTS.mono, fontSize: size >= 60 ? 18 : 11, color: c.text, fontVariantNumeric: 'tabular-nums' }}>{t}</div>
    </div>
  );
}
