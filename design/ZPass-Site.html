<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZPass — a calmer password manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0c0c0d;
  --bg-elev: #111113;
  --bg-elev-2: #16161a;
  --bg-hover: #18181c;
  --bg-active: #1d1d22;
  --line: #232328;
  --line-soft: #1a1a1e;
  --text: #ececec;
  --text-2: #a8a8ac;
  --text-3: #6e6e73;
  --text-4: #45454a;
  --accent: #d4ff3a;
  --accent-ink: #0c0c0d;
  --danger: #e55a4a;
  --ok: #5ea47a;
  --info: #6b9cc4;
  --grid: rgba(255,255,255,0.04);

  --radius-sm: 5px;
  --radius: 7px;
  --radius-lg: 10px;

  --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  --max-w: 1320px;
  --gutter: 40px;
}

[data-theme="light"] {
  --bg: #f5f5f3;
  --bg-elev: #fbfbf9;
  --bg-elev-2: #ffffff;
  --bg-hover: #ededea;
  --bg-active: #e4e4e0;
  --line: #d8d8d2;
  --line-soft: #e6e6e2;
  --text: #141416;
  --text-2: #4a4a4e;
  --text-3: #77777c;
  --text-4: #a6a6aa;
  --accent: #8ab10f;
  --accent-ink: #ffffff;
  --grid: rgba(0,0,0,0.04);
}

[data-body="mono"] { --font-sans: "Geist Mono", ui-monospace, monospace; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01","ss02","cv01";
  font-size: 15px;
  line-height: 1.55;
}
button, input, select, textarea { font: inherit; color: inherit; }
button { background: none; border: 0; cursor: pointer; padding: 0; color: inherit; }
a { color: inherit; text-decoration: none; }
::selection { background: var(--accent); color: var(--accent-ink); }

.mono { font-family: var(--font-mono); font-feature-settings: "zero","ss01"; }

/* shell */
.wrap {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 var(--gutter);
  position: relative;
}

/* corner cross markers — crosses at major grid intersections */
.cross {
  position: absolute;
  width: 11px; height: 11px;
  color: var(--text-4);
  pointer-events: none;
}
.cross::before, .cross::after {
  content: ""; position: absolute; background: currentColor;
}
.cross::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-0.5px); }
.cross::after  { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-0.5px); }

/* NAV */
.nav {
  position: sticky; top: 0; z-index: 40;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter: saturate(140%) blur(14px);
  -webkit-backdrop-filter: saturate(140%) blur(14px);
  border-bottom: 1px solid var(--line-soft);
}
.nav-inner {
  height: 56px;
  display: flex; align-items: center; gap: 28px;
}
.brand {
  display: inline-flex; align-items: center; gap: 10px;
  font-weight: 600; letter-spacing: -0.01em; font-size: 15px;
}
.brand .logo {
  width: 24px; height: 24px; border-radius: 5px;
  background: var(--text); color: var(--bg);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-weight: 600; font-size: 13px;
}
.brand .tag {
  margin-left: 2px; font-family: var(--font-mono); font-size: 10px;
  color: var(--text-3); padding: 2px 6px; border: 1px solid var(--line); border-radius: 4px;
}
.nav-links { display: flex; gap: 22px; }
.nav-links a {
  font-size: 13px; color: var(--text-2);
  padding: 4px 0;
}
.nav-links a:hover { color: var(--text); }
.nav-spacer { flex: 1; }
.nav-right { display: flex; align-items: center; gap: 10px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 34px; padding: 0 14px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--text);
  font-size: 13px;
  transition: border-color .15s, background .15s, color .15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--text-4); background: var(--bg-hover); }
.btn.primary {
  background: var(--text); color: var(--bg); border-color: var(--text);
}
.btn.primary:hover { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.btn.ghost { background: transparent; }
.btn .arrow { font-family: var(--font-mono); opacity: .7; }
.lang-toggle {
  display: inline-flex; border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--bg-elev); overflow: hidden;
}
.lang-toggle button {
  padding: 6px 10px; font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  border-right: 1px solid var(--line);
}
.lang-toggle button:last-child { border-right: 0; }
.lang-toggle button.on { background: var(--text); color: var(--bg); }

/* ============== HERO ============== */
.hero {
  position: relative;
  padding: 96px 0 64px;
  border-bottom: 1px solid var(--line-soft);
  overflow: hidden;
}
.hero-grid-bg {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, var(--grid) 1px, transparent 1px),
    linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
  background-size: 88px 88px;
  mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 70%);
  pointer-events: none;
}
.eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
}
.hero h1 {
  margin: 28px 0 0;
  font-size: clamp(48px, 8vw, 104px);
  line-height: 0.95;
  letter-spacing: -0.035em;
  font-weight: 500;
  max-width: 14ch;
  text-wrap: balance;
}
.hero h1 .dim { color: var(--text-3); }
.hero h1 .accent-line {
  display: inline-block;
  position: relative;
}
.hero h1 .accent-line::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: 0.08em;
  height: 0.14em; background: var(--accent); z-index: -1; opacity: .7;
}
.hero p.lede {
  margin: 28px 0 0;
  max-width: 58ch;
  font-size: 17px;
  line-height: 1.55;
  color: var(--text-2);
  text-wrap: pretty;
}
.hero-cta {
  margin-top: 36px;
  display: flex; flex-wrap: wrap; gap: 10px;
}
.hero-availability {
  margin-top: 24px; font-family: var(--font-mono); font-size: 11px;
  color: var(--text-3); letter-spacing: 0.03em;
}
.hero-panel {
  margin-top: 56px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  overflow: hidden;
  position: relative;
}
.hero-panel-head {
  display: flex; align-items: center; gap: 12px;
  height: 38px;
  padding: 0 14px;
  border-bottom: 1px solid var(--line-soft);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
}
.hero-panel-head .dots { display: flex; gap: 6px; }
.hero-panel-head .dots i { width: 9px; height: 9px; border-radius: 50%; background: var(--line); display: inline-block; }
.hero-panel-head .title { color: var(--text-2); }
.hero-panel-head .spacer { flex: 1; }
.hero-panel-head .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); padding: 2px 6px; border: 1px solid var(--line); border-radius: 4px; }

/* hero variant: terminal */
.terminal {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  padding: 28px 28px 32px;
  color: var(--text-2);
  min-height: 320px;
}
.terminal .prompt { color: var(--text-3); margin-right: 10px; }
.terminal .cmd { color: var(--text); }
.terminal .out { color: var(--text-3); }
.terminal .ok { color: var(--accent); }
.terminal .ghost { color: var(--text-4); }
.terminal .caret {
  display: inline-block; width: 7px; height: 14px; background: var(--text);
  vertical-align: -2px; animation: blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* hero variant: crypto diagram */
.cryptopanel {
  padding: 28px 24px 32px;
  min-height: 360px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
}
.crypto-svg { width: 100%; height: auto; display: block; }
.crypto-legend {
  display: flex; gap: 18px; flex-wrap: wrap;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
}
.crypto-legend .sw { width: 10px; height: 10px; display: inline-block; margin-right: 6px; vertical-align: -1px; border-radius: 2px; }

/* hero variant: live demo */
.demo-frame {
  height: 620px; width: 100%;
  border: 0; background: var(--bg);
  display: block;
}
.demo-hint {
  padding: 10px 14px; border-top: 1px solid var(--line-soft);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  display: flex; gap: 10px; align-items: center; justify-content: space-between;
}

.hero-stats {
  margin-top: 48px;
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--line-soft);
  border-bottom: 1px solid var(--line-soft);
}
.hero-stats > div {
  padding: 20px 0;
  border-right: 1px solid var(--line-soft);
}
.hero-stats > div:last-child { border-right: 0; }
.hero-stats .n {
  font-family: var(--font-mono); font-size: 28px; font-weight: 500;
  letter-spacing: -0.02em; color: var(--text);
}
.hero-stats .l {
  margin-top: 6px; font-size: 12px; color: var(--text-3);
  max-width: 20ch;
}

/* ============== SECTION SHARED ============== */
.section { padding: 120px 0; position: relative; border-bottom: 1px solid var(--line-soft); }
.section h2 {
  margin: 0;
  font-size: clamp(32px, 4.6vw, 56px);
  letter-spacing: -0.02em;
  font-weight: 500;
  line-height: 1.02;
  max-width: 22ch;
  text-wrap: balance;
}
.section .sec-sub {
  margin-top: 16px;
  color: var(--text-2);
  max-width: 58ch;
  font-size: 16px;
}
.sec-head {
  display: grid; grid-template-columns: 220px 1fr;
  gap: 40px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--line-soft);
  margin-bottom: 48px;
}
.sec-head .index {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.1em;
  padding-top: 10px;
}
.sec-head .index b { color: var(--text); font-weight: 500; }

/* ============== INSTALL ============== */
.install {
  padding: 80px 0;
  border-bottom: 1px solid var(--line-soft);
}
.install-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.install-card {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  overflow: hidden;
}
.install-card .head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line-soft);
}
.install-card .head .n {
  width: 22px; height: 22px; border-radius: 4px;
  background: var(--bg-elev-2); border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-2);
}
.install-card .head .t { font-weight: 500; font-size: 14px; }
.install-card .head .tag { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); padding: 2px 6px; border: 1px solid var(--line); border-radius: 4px; }
.install-card .body {
  padding: 22px 20px;
  font-family: var(--font-mono); font-size: 13px; line-height: 1.7;
  color: var(--text);
  min-height: 160px;
  display: flex; flex-direction: column; gap: 8px;
}
.install-card .body .comment { color: var(--text-3); }
.install-card .body .cmd { color: var(--text); }
.install-card .body .copy {
  align-self: flex-start;
  margin-top: auto;
  font-size: 11px; padding: 6px 10px;
  border: 1px solid var(--line); border-radius: 5px;
  color: var(--text-2);
  display: inline-flex; align-items: center; gap: 6px;
}
.install-card .body .copy:hover { color: var(--text); border-color: var(--text-4); }
.install-card .desc {
  padding: 14px 20px 20px; font-family: var(--font-sans); font-size: 13px; color: var(--text-2);
  border-top: 1px solid var(--line-soft);
}

/* ============== FEATURES GRID ============== */
.features {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg-elev);
}
.feature {
  padding: 32px 28px 36px;
  border-right: 1px solid var(--line-soft);
  border-bottom: 1px solid var(--line-soft);
  position: relative;
  min-height: 240px;
  display: flex; flex-direction: column;
}
.feature:nth-child(3n) { border-right: 0; }
.feature:nth-last-child(-n+3) { border-bottom: 0; }
.feature .num {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  letter-spacing: 0.1em;
}
.feature h3 { margin: 14px 0 8px; font-size: 19px; letter-spacing: -0.01em; font-weight: 500; }
.feature p { margin: 0; color: var(--text-2); font-size: 14px; line-height: 1.55; }
.feature .icon {
  width: 34px; height: 34px; margin-top: auto;
  border: 1px solid var(--line);
  border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-3);
}

/* ============== HOW IT WORKS ============== */
.how {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}
.how-diagram {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  padding: 28px;
  position: sticky; top: 80px;
}
.how-steps { display: flex; flex-direction: column; gap: 24px; }
.how-step {
  padding: 24px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.how-step:hover { background: var(--bg-hover); border-color: var(--text-4); }
.how-step.active { border-color: var(--text); background: var(--bg-elev-2); }
.how-step .kicker {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  display: flex; align-items: center; gap: 8px;
}
.how-step .kicker .k {
  width: 20px; height: 20px; border: 1px solid var(--line); border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-elev-2); color: var(--text-2); font-size: 10px;
}
.how-step.active .kicker .k { background: var(--text); color: var(--bg); border-color: var(--text); }
.how-step h3 { margin: 10px 0 6px; font-size: 20px; font-weight: 500; letter-spacing: -0.01em; }
.how-step p { margin: 0; color: var(--text-2); font-size: 14px; }

/* ============== LIVE DEMO ============== */
.live {
  padding: 80px 0 120px;
  border-bottom: 1px solid var(--line-soft);
}
.live-frame-wrap {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg);
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}
.live-head {
  display: flex; align-items: center; gap: 12px;
  height: 42px; padding: 0 14px;
  border-bottom: 1px solid var(--line-soft);
  background: var(--bg-elev);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
}
.live-head .url {
  flex: 1; display: flex; justify-content: center;
}
.live-head .url span {
  padding: 5px 14px; border-radius: 5px;
  background: var(--bg); border: 1px solid var(--line);
  color: var(--text-2); min-width: 280px; text-align: center;
}
.live iframe { width: 100%; height: 720px; border: 0; display: block; background: var(--bg); }

/* ============== MOBILE ============== */
.mobile-row {
  display: grid; grid-template-columns: 1fr 380px;
  gap: 60px; align-items: center;
}
.mobile-stage {
  height: 720px; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.phone-bezel {
  width: 320px; height: 660px;
  border-radius: 44px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  padding: 10px;
  position: relative;
  box-shadow:
    0 0 0 1px var(--line-soft),
    0 40px 80px rgba(0,0,0,0.55);
}
.phone-bezel::before {
  content: ""; position: absolute; left: 50%; top: 18px;
  width: 100px; height: 28px; border-radius: 99px;
  background: #000;
  transform: translateX(-50%);
  z-index: 2;
}
.phone-screen {
  width: 100%; height: 100%; border-radius: 34px;
  overflow: hidden;
  background: var(--bg);
  border: 1px solid var(--line-soft);
}
.phone-screen iframe { width: 100%; height: 100%; border: 0; display: block; }
.mobile-copy h2 { max-width: 16ch; }

/* ============== SECURITY ============== */
.sec-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg-elev);
}
.sec-cell {
  padding: 28px;
  border-right: 1px solid var(--line-soft);
  border-bottom: 1px solid var(--line-soft);
  min-height: 180px;
}
.sec-cell:nth-child(3n) { border-right: 0; }
.sec-cell:nth-last-child(-n+3) { border-bottom: 0; }
.sec-cell .k {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em;
}
.sec-cell h4 { margin: 8px 0 10px; font-size: 17px; font-weight: 500; letter-spacing: -0.01em; }
.sec-cell .v { font-family: var(--font-mono); font-size: 12.5px; color: var(--text-2); line-height: 1.7; }

.audits {
  margin-top: 32px;
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 16px;
}
.audit-card {
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--bg-elev);
}
.audit-card .firm { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.audit-card h5 { margin: 6px 0 2px; font-size: 15px; font-weight: 500; }
.audit-card .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.audit-card .link { margin-top: 14px; font-size: 12px; color: var(--text-2); display: inline-flex; align-items: center; gap: 6px; }
.audit-card .link:hover { color: var(--accent); }

/* ============== CHANGELOG ============== */
.changelog {
  display: grid; grid-template-columns: 140px 1fr;
  gap: 40px;
}
.changelog-list { display: flex; flex-direction: column; }
.change {
  display: grid; grid-template-columns: 120px 1fr;
  gap: 40px;
  padding: 20px 0;
  border-bottom: 1px solid var(--line-soft);
  align-items: baseline;
}
.change:last-child { border-bottom: 0; }
.change .ver {
  font-family: var(--font-mono); font-size: 12px; color: var(--text);
  display: flex; flex-direction: column;
}
.change .ver .d { color: var(--text-3); font-size: 11px; margin-top: 2px; }
.change .notes { font-size: 14px; color: var(--text-2); }
.change .notes .tag {
  display: inline-block; padding: 1px 6px; border: 1px solid var(--line); border-radius: 4px;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  margin-right: 8px;
}
.change .notes .tag.feat { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 50%, var(--line)); }
.change .notes .tag.fix { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 50%, var(--line)); }
.change .notes .tag.sec { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 50%, var(--line)); }
.change .notes p { margin: 6px 0 0; }

/* ============== FAQ ============== */
.faq-list { display: flex; flex-direction: column; }
.faq-item {
  padding: 24px 0;
  border-bottom: 1px solid var(--line-soft);
}
.faq-q {
  display: flex; align-items: center; gap: 20px;
  cursor: pointer;
  width: 100%; text-align: left;
  font-size: 18px; font-weight: 500; letter-spacing: -0.01em;
}
.faq-q .i {
  margin-left: auto; font-family: var(--font-mono); font-size: 18px; color: var(--text-3);
  transition: transform .2s;
}
.faq-item.open .faq-q .i { transform: rotate(45deg); color: var(--text); }
.faq-a {
  max-height: 0; overflow: hidden;
  transition: max-height .25s ease;
  color: var(--text-2); font-size: 15px;
  max-width: 70ch;
}
.faq-item.open .faq-a { max-height: 260px; padding-top: 12px; }

/* ============== FOOTER ============== */
footer.foot {
  padding: 80px 0 60px;
  background: var(--bg-elev);
  border-top: 1px solid var(--line-soft);
}
.foot-top {
  display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr;
  gap: 40px;
  padding-bottom: 56px;
  border-bottom: 1px solid var(--line-soft);
}
.foot-col h6 {
  margin: 0 0 14px; font-family: var(--font-mono); font-size: 11px;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em;
  font-weight: 500;
}
.foot-col a { display: block; padding: 5px 0; font-size: 13px; color: var(--text-2); }
.foot-col a:hover { color: var(--text); }
.foot-tagline {
  font-size: 14px; color: var(--text-2); max-width: 32ch; margin-top: 18px;
}
.foot-bottom {
  padding-top: 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
}

/* ============== TWEAKS PANEL ============== */
.tweaks-panel {
  position: fixed; right: 20px; bottom: 20px; z-index: 100;
  width: 280px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 14px;
  font-size: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  display: none;
}
.tweaks-panel.on { display: block; }
.tweaks-panel .t-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.tweaks-panel .t-head h6 { margin: 0; font-family: var(--font-mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; }
.tweaks-panel .t-head button { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.tweak-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-top: 1px solid var(--line-soft); }
.tweak-row:first-of-type { border-top: 0; }
.tweak-row .k { color: var(--text-2); }
.tweak-row .segs { display: inline-flex; border: 1px solid var(--line); border-radius: 5px; overflow: hidden; }
.tweak-row .segs button { padding: 4px 8px; font-family: var(--font-mono); font-size: 11px; color: var(--text-3); border-right: 1px solid var(--line); }
.tweak-row .segs button:last-child { border-right: 0; }
.tweak-row .segs button.on { background: var(--text); color: var(--bg); }
.tweak-row .swatches { display: inline-flex; gap: 6px; }
.tweak-row .swatches button { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--line); }
.tweak-row .swatches button.on { box-shadow: 0 0 0 2px var(--text); }

/* reveals — default to visible; JS adds .pending for off-screen items only */
.reveal { opacity: 1; transform: none; transition: opacity .6s ease, transform .6s ease; }
.reveal.pending { opacity: 0; transform: translateY(12px); }
.reveal.in { opacity: 1; transform: none; }

/* responsive */
@media (max-width: 960px) {
  .foot-top { grid-template-columns: 1fr 1fr; }
  .hero h1 { font-size: 54px; }
  .sec-head { grid-template-columns: 1fr; }
  .features, .sec-grid { grid-template-columns: 1fr 1fr; }
  .hero-stats { grid-template-columns: 1fr 1fr; }
  .how { grid-template-columns: 1fr; }
  .how-diagram { position: static; }
  .mobile-row { grid-template-columns: 1fr; }
  .install-grid { grid-template-columns: 1fr; }
  .audits { grid-template-columns: 1fr; }
  .changelog { grid-template-columns: 1fr; }
}
