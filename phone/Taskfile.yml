version: "3"

# ZPass phone 端开发流程编排（Linux / macOS / Windows 通用）
#
# 典型用法：
#   task              查看所有 task
#   task so           编译 cryptocore → 4 ABI libcryptocore.so（cargo-ndk）
#   task emulator     启动 Android 模拟器（已开则跳过）
#   task dev          一键：.so + 模拟器 + expo run:android
#   task metro        启动 metro dev server（脱离 run:android 单独开）
#   task apk:release  一键打包 Android release APK（含最新 .so）
#
# 切换云后端地址（仅 dev 模式）：注入 EXPO_PUBLIC_CLOUD_DEV_URL 让 app 默认连本地云后端，
#   不注入则连线上 https://zpass-app.zerx.dev（生产固定线上）。dev 下云账户页可一键切回线上。
#   模拟器: EXPO_PUBLIC_CLOUD_DEV_URL=http://10.0.2.2:8080 task dev
#   真机:   EXPO_PUBLIC_CLOUD_DEV_URL=http://192.168.x.x:8080 task dev
#
# 第一次使用需要的工具：
#   - Task：              go install github.com/go-task/task/v3/cmd/task@latest
#   - Rust toolchain：    rustup（>=1.85 for edition 2024）
#   - cargo-ndk：         cargo install cargo-ndk
#   - Android target：    rustup target add aarch64-linux-android armv7-linux-androideabi \
#                                            x86_64-linux-android i686-linux-android
#   - JDK 17~21：         Linux 用 openjdk-17；Windows 默认复用 Android Studio 自带 JBR
#                         （系统默认 Java 26 与 RN 0.81 不兼容）
#   - Android SDK + NDK： Android Studio 安装；NDK 推荐 27.x
#
# Windows 注意：task 内置 POSIX 解释器，但没有 awk/head/nohup 等外部工具，
# 本文件所有命令只依赖 shell 内建 + adb/emulator/cargo 等跨平台二进制。

vars:
  REPO_ROOT:
    sh: git rev-parse --show-toplevel
  CRYPTOCORE_DIR: "{{.REPO_ROOT}}/cryptocore"

  # 允许 env override；否则按平台取常见默认路径
  JAVA_HOME_DEFAULT:
    sh: '{{if eq OS "windows"}}echo "$LOCALAPPDATA/Programs/Android Studio/jbr"{{else}}echo /usr/lib/jvm/java-17-openjdk{{end}}'
  ANDROID_HOME_DEFAULT:
    sh: '{{if eq OS "windows"}}echo "$LOCALAPPDATA/Android/Sdk"{{else}}echo "$HOME/Android/Sdk"{{end}}'

env:
  # 优先沿用 user env；缺失时回落默认。RN 0.81 必须 Java 17~21，
  # 系统默认 Java 26 会让 Kotlin Gradle Plugin 解析版本号崩溃。
  # gradle 通过 JAVA_HOME 选 JDK，所以只要这里设对，PATH 不必动。
  JAVA_HOME:
    sh: echo "${JAVA_HOME:-{{.JAVA_HOME_DEFAULT}}}"
  ANDROID_HOME:
    sh: echo "${ANDROID_HOME:-{{.ANDROID_HOME_DEFAULT}}}"
  # cargo-ndk 需要 NDK；未指定时从 SDK 下选最新版（glob 按名字典序，最后一个即最新）
  ANDROID_NDK_HOME:
    sh: |
      if [ -n "$ANDROID_NDK_HOME" ]; then
        echo "$ANDROID_NDK_HOME"
      else
        SDK="${ANDROID_HOME:-{{.ANDROID_HOME_DEFAULT}}}"
        latest=""
        for d in "$SDK"/ndk/*/; do latest="${d%/}"; latest="${latest%\\}"; done
        if [ -d "$latest" ]; then echo "$latest"; fi
      fi
  # 开发期云后端地址（仅 dev 模式生效；Expo 打包时把 EXPO_PUBLIC_* 内联进 bundle）。
  # 空 → app 默认连线上 zpass-app.zerx.dev；设值 → dev 默认连本地，云账户页可一键切回线上。
  EXPO_PUBLIC_CLOUD_DEV_URL:
    sh: echo "${EXPO_PUBLIC_CLOUD_DEV_URL:-}"

tasks:
  default:
    desc: 列出可用 task
    cmds:
      - task --list

  # ---- cryptocore .so ----

  so:
    desc: 编译 cryptocore 为 4 ABI libcryptocore.so（cargo-ndk）
    dir: "{{.CRYPTOCORE_DIR}}"
    cmds:
      # Linux/macOS 走脚本（含更完整的环境检查）；Windows 无法直接执行 .sh，内联等价命令
      - cmd: ./scripts/build-android.sh
        platforms: [linux, darwin]
      - cmd: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
        platforms: [windows]
      - cmd: cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 --platform 24 --output-dir build/jniLibs -- build --release --features android
        platforms: [windows]
    sources:
      - "src/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
    generates:
      - "build/jniLibs/arm64-v8a/libcryptocore.so"
      - "build/jniLibs/armeabi-v7a/libcryptocore.so"
      - "build/jniLibs/x86_64/libcryptocore.so"
      - "build/jniLibs/x86/libcryptocore.so"

  so:fast:
    desc: 同 so，只编 arm64-v8a（调试时省时间）
    dir: "{{.CRYPTOCORE_DIR}}"
    env:
      CRYPTOCORE_ABIS: "arm64-v8a"
    cmds:
      - cmd: ./scripts/build-android.sh
        platforms: [linux, darwin]
      - cmd: rustup target add aarch64-linux-android
        platforms: [windows]
      - cmd: cargo ndk -t arm64-v8a --platform 24 --output-dir build/jniLibs -- build --release --features android
        platforms: [windows]

  so:clean:
    desc: 删除 .so 产物（强制下次重新编）
    cmds:
      - cmd: rm -rf "{{.CRYPTOCORE_DIR}}/build" "{{.CRYPTOCORE_DIR}}/target" android/app/src/main/jniLibs
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -Command "Remove-Item -Recurse -Force -ErrorAction SilentlyContinue '{{.CRYPTOCORE_DIR}}/build','{{.CRYPTOCORE_DIR}}/target','android/app/src/main/jniLibs'"
        platforms: [windows]

  # ---- 模拟器 ----

  emulator:list:
    desc: 列出本机所有 AVD
    cmds:
      - '"$ANDROID_HOME/emulator/emulator" -list-avds'
    silent: true

  emulator:running:
    desc: 列出当前已经在跑的设备/模拟器
    cmds:
      - '"$ANDROID_HOME/platform-tools/adb" devices'
    silent: true

  emulator:
    desc: 启动模拟器；若已有设备在跑则跳过
    silent: true
    cmds:
      - |
        ADB="$ANDROID_HOME/platform-tools/adb"
        EMU="$ANDROID_HOME/emulator/emulator"
        # 解析 adb devices：状态为 device 的行形如 "emulator-5554\tdevice"
        RUNNING=""
        while read -r line; do
          line="${line%$'\r'}"
          case "$line" in
            *device) RUNNING="${line%%$'\t'*}" ;;
          esac
        done <<EOF
        $("$ADB" devices)
        EOF
        if [ -n "$RUNNING" ]; then
          echo "[skip] 已有设备在跑：$RUNNING"
          exit 0
        fi
        AVD="${ZPASS_AVD:-}"
        if [ -z "$AVD" ]; then
          read -r AVD <<EOF
        $("$EMU" -list-avds)
        EOF
          AVD="${AVD%$'\r'}"
        fi
        if [ -z "$AVD" ]; then
          echo "[error] 找不到 AVD —— 用 Android Studio 创建一个，或 export ZPASS_AVD=<name>" >&2
          exit 1
        fi
        echo "[start] 启动 $AVD ..."
        {{if eq OS "windows" -}}
        powershell -NoProfile -Command "Start-Process -FilePath '$EMU.exe' -ArgumentList '-avd','$AVD','-no-snapshot-save'"
        {{- else -}}
        nohup "$EMU" -avd "$AVD" -no-snapshot-save >/tmp/zpass-emulator.log 2>&1 &
        {{- end}}
        echo "[wait] 等待 boot complete ..."
        "$ADB" wait-for-device
        BOOT=""
        until [ "$BOOT" = "1" ]; do
          "$ADB" shell sleep 1
          BOOT="$("$ADB" shell getprop sys.boot_completed 2>/dev/null)"
          BOOT="${BOOT%$'\r'}"
        done
        echo "[ok] 模拟器已启动"

  # ---- expo / metro ----

  metro:
    desc: 启动 metro dev server（带 cache clear）
    cmds:
      - bunx expo start -c

  prebuild:
    desc: 执行 expo prebuild（plugin 会复制 .so 到 jniLibs）
    deps: [so]
    cmds:
      - bunx expo prebuild --platform android

  android:
    desc: 在已就绪的模拟器上 expo run:android（不重 build .so/不启动模拟器）
    cmds:
      - bunx expo run:android

  # ---- 一键开发流程 ----

  dev:
    desc: 一键：.so + prebuild(复制 .so 到 jniLibs) + 启动模拟器 + expo run:android
    # prebuild 自带 so 依赖，所以 .so 先于 prebuild 完成；emulator 并行启动
    deps: [prebuild, emulator]
    cmds:
      - bunx expo run:android

  dev:fast:
    desc: dev 但只编 arm64 .so
    deps: [so:fast, emulator]
    cmds:
      # 只编单 ABI 时不挂 prebuild 依赖，由这里显式 prebuild 一次复制 .so
      - bunx expo prebuild --platform android
      - bunx expo run:android

  # ---- release 打包 ----

  apk:release:
    desc: 一键打包 Android release APK（含最新 .so）
    deps: [so]
    dir: "{{.REPO_ROOT}}/phone/android"
    cmds:
      # 未指定 ZPASS_UPLOAD_STORE_FILE 时，gradle 会回落到 debug.keystore 签名，
      # 产物可直接 adb install / 拷贝到手机安装，但不可上架 Play Store。
      - cmd: ./gradlew assembleRelease
        platforms: [linux, darwin]
      - cmd: cmd /c gradlew.bat assembleRelease
        platforms: [windows]
      - |
        APK="{{.REPO_ROOT}}/phone/android/app/build/outputs/apk/release/app-release.apk"
        if [ ! -f "$APK" ]; then
          echo "[error] 未找到 APK：$APK" >&2
          exit 1
        fi
        echo ""
        echo "[ok] release APK 已生成"
        echo "  path: $APK"
        if [ -z "$ZPASS_UPLOAD_STORE_FILE" ]; then
          echo "  sign: debug.keystore（未配置 ZPASS_UPLOAD_STORE_FILE，仅供本地分发）"
        else
          echo "  sign: $ZPASS_UPLOAD_STORE_FILE"
        fi

  aab:release:
    desc: 打包 Android release AAB（Play Store 上架格式）
    deps: [so]
    dir: "{{.REPO_ROOT}}/phone/android"
    cmds:
      - cmd: ./gradlew bundleRelease
        platforms: [linux, darwin]
      - cmd: cmd /c gradlew.bat bundleRelease
        platforms: [windows]
      - |
        AAB="{{.REPO_ROOT}}/phone/android/app/build/outputs/bundle/release/app-release.aab"
        if [ ! -f "$AAB" ]; then
          echo "[error] 未找到 AAB：$AAB" >&2
          exit 1
        fi
        echo ""
        echo "[ok] release AAB 已生成"
        echo "  path: $AAB"

  # ---- 排错 ----

  doctor:
    desc: 检查环境（Java/NDK/cargo-ndk/AVD）
    silent: true
    cmds:
      - 'echo "JAVA_HOME       = $JAVA_HOME"'
      - 'echo "ANDROID_HOME    = $ANDROID_HOME"'
      - 'echo "ANDROID_NDK_HOME= $ANDROID_NDK_HOME"'
      - 'echo ""'
      # 直接调用 $JAVA_HOME/bin/java，绕开 task 不可靠的 PATH 覆盖
      - 'echo "[java]"; "$JAVA_HOME/bin/java" -version 2>&1 || echo "  (not found: $JAVA_HOME)"'
      - 'echo "[rust]"; cargo --version 2>/dev/null || echo "  (not installed: https://rustup.rs)"'
      - 'echo "[cargo-ndk]"; cargo ndk --version 2>/dev/null || echo "  (not installed: cargo install cargo-ndk)"'
      - 'echo "[adb]"; "$ANDROID_HOME/platform-tools/adb" version 2>&1 || echo "  (not found)"'
      - 'echo "[avd]"; "$ANDROID_HOME/emulator/emulator" -list-avds 2>&1 || echo "  (not found)"'

  logcat:
    desc: 跟随 zpass app 的 ReactNativeJS / Expo / FATAL 日志
    cmds:
      - '"$ANDROID_HOME/platform-tools/adb" logcat -v color ReactNativeJS:V ExpoModulesCore:V AndroidRuntime:E "*:S"'
