version: "3"

# ZPass phone 端开发流程编排
#
# 典型用法：
#   task              查看所有 task
#   task so           编译 cryptocore → 4 ABI libcryptocore.so（cargo-ndk）
#   task emulator     启动 Android 模拟器（已开则跳过）
#   task dev          一键：.so + 模拟器 + expo run:android
#   task metro        启动 metro dev server（脱离 run:android 单独开）
#   task apk:release  一键打包 Android release APK（含最新 .so）
#
# 第一次使用需要的工具：
#   - Task：              go install github.com/go-task/task/v3/cmd/task@latest
#   - Rust toolchain：    rustup（>=1.85 for edition 2024）
#   - cargo-ndk：         cargo install cargo-ndk
#   - Android target：    rustup target add aarch64-linux-android armv7-linux-androideabi \
#                                            x86_64-linux-android i686-linux-android
#   - JDK 17：            pacman / apt 装 openjdk-17（系统默认 Java 26 与 RN 0.81 不兼容）
#   - Android SDK + NDK： Android Studio 安装；NDK 推荐 27.x

vars:
  REPO_ROOT:
    sh: git rev-parse --show-toplevel
  CRYPTOCORE_DIR: "{{.REPO_ROOT}}/cryptocore"

  # 允许 env override；否则用 Arch/常见 Linux 默认路径
  JAVA_HOME_DEFAULT: /usr/lib/jvm/java-17-openjdk
  ANDROID_HOME_DEFAULT: "{{.HOME}}/Android/Sdk"

env:
  # 优先沿用 user env；缺失时回落默认。RN 0.81 必须 Java 17，
  # 系统默认 Java 26 会让 Kotlin Gradle Plugin 解析版本号崩溃。
  # gradle 通过 JAVA_HOME 选 JDK，所以只要这里设对，PATH 不必动。
  JAVA_HOME:
    sh: echo "${JAVA_HOME:-{{.JAVA_HOME_DEFAULT}}}"
  ANDROID_HOME:
    sh: echo "${ANDROID_HOME:-{{.ANDROID_HOME_DEFAULT}}}"
  # cargo-ndk 需要 NDK；未指定时从 SDK 下选最新版
  ANDROID_NDK_HOME:
    sh: |
      if [ -n "$ANDROID_NDK_HOME" ]; then
        echo "$ANDROID_NDK_HOME"
      else
        SDK="${ANDROID_HOME:-{{.ANDROID_HOME_DEFAULT}}}"
        if [ -d "$SDK/ndk" ]; then
          ls -1 "$SDK/ndk" | sort -V | tail -1 | awk -v sdk="$SDK" '{print sdk"/ndk/"$0}'
        fi
      fi

tasks:
  default:
    desc: 列出可用 task
    cmds:
      - task --list

  # ---- cryptocore .so ----

  so:
    desc: 编译 cryptocore 为 4 ABI libcryptocore.so（cargo-ndk）
    dir: "{{.CRYPTOCORE_DIR}}"
    cmds:
      - ./scripts/build-android.sh
    sources:
      - "src/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
    generates:
      - "build/jniLibs/arm64-v8a/libcryptocore.so"
      - "build/jniLibs/armeabi-v7a/libcryptocore.so"
      - "build/jniLibs/x86_64/libcryptocore.so"
      - "build/jniLibs/x86/libcryptocore.so"

  so:fast:
    desc: 同 so，只编 arm64-v8a（调试时省时间）
    dir: "{{.CRYPTOCORE_DIR}}"
    env:
      CRYPTOCORE_ABIS: "arm64-v8a"
    cmds:
      - ./scripts/build-android.sh

  so:test:
    desc: 跑 cryptocore Rust 单测 + 跨语言 fixture 校验
    dir: "{{.CRYPTOCORE_DIR}}"
    cmds:
      - cargo test

  so:clean:
    desc: 删除 .so 产物（强制下次重新编）
    cmds:
      - rm -rf {{.CRYPTOCORE_DIR}}/build
      - rm -rf {{.CRYPTOCORE_DIR}}/target
      - rm -rf android/app/src/main/jniLibs

  # ---- 模拟器 ----

  emulator:list:
    desc: 列出本机所有 AVD
    cmds:
      - "$ANDROID_HOME/emulator/emulator -list-avds"
    silent: true

  emulator:running:
    desc: 列出当前已经在跑的设备/模拟器
    cmds:
      - "$ANDROID_HOME/platform-tools/adb devices"
    silent: true

  emulator:
    desc: 启动模拟器；若已有设备在跑则跳过
    silent: true
    cmds:
      - |
        ADB="$ANDROID_HOME/platform-tools/adb"
        EMU="$ANDROID_HOME/emulator/emulator"
        if "$ADB" devices | awk 'NR>1 && $2=="device" {found=1} END{exit !found}'; then
          echo "[skip] 已有设备在跑：$("$ADB" devices | awk 'NR>1 && $2=="device" {print $1}' | head -1)"
          exit 0
        fi
        AVD="${ZPASS_AVD:-$($EMU -list-avds | head -1)}"
        if [ -z "$AVD" ]; then
          echo "[error] 找不到 AVD —— 用 Android Studio 创建一个，或 export ZPASS_AVD=<name>" >&2
          exit 1
        fi
        echo "[start] 启动 $AVD ..."
        nohup "$EMU" -avd "$AVD" -no-snapshot-save >/tmp/zpass-emulator.log 2>&1 &
        echo "[wait] 等待 boot complete (日志: /tmp/zpass-emulator.log) ..."
        "$ADB" wait-for-device
        until [ "$("$ADB" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ]; do
          sleep 1
        done
        echo "[ok] 模拟器已启动"

  # ---- expo / metro ----

  metro:
    desc: 启动 metro dev server（带 cache clear）
    cmds:
      - bunx expo start -c

  prebuild:
    desc: 执行 expo prebuild（plugin 会复制 .so 到 jniLibs）
    deps: [so]
    cmds:
      - bunx expo prebuild --platform android

  android:
    desc: 在已就绪的模拟器上 expo run:android（不重 build .so/不启动模拟器）
    cmds:
      - bunx expo run:android

  # ---- 一键开发流程 ----

  dev:
    desc: 一键：.so + prebuild(复制 .so 到 jniLibs) + 启动模拟器 + expo run:android
    # prebuild 自带 so 依赖，所以 .so 先于 prebuild 完成；emulator 并行启动
    deps: [prebuild, emulator]
    cmds:
      - bunx expo run:android

  dev:fast:
    desc: dev 但只编 arm64 .so
    deps: [so:fast, emulator]
    cmds:
      # 只编单 ABI 时不挂 prebuild 依赖，由这里显式 prebuild 一次复制 .so
      - bunx expo prebuild --platform android
      - bunx expo run:android

  # ---- release 打包 ----

  apk:release:
    desc: 一键打包 Android release APK（含最新 .so）
    deps: [so]
    dir: "{{.REPO_ROOT}}/phone/android"
    cmds:
      # 未指定 ZPASS_UPLOAD_STORE_FILE 时，gradle 会回落到 debug.keystore 签名，
      # 产物可直接 adb install / 拷贝到手机安装，但不可上架 Play Store。
      - ./gradlew assembleRelease
      - |
        APK="{{.REPO_ROOT}}/phone/android/app/build/outputs/apk/release/app-release.apk"
        if [ ! -f "$APK" ]; then
          echo "[error] 未找到 APK：$APK" >&2
          exit 1
        fi
        echo ""
        echo "[ok] release APK 已生成"
        echo "  path: $APK"
        echo "  size: $(du -h "$APK" | awk '{print $1}')"
        if [ -z "$ZPASS_UPLOAD_STORE_FILE" ]; then
          echo "  sign: debug.keystore（未配置 ZPASS_UPLOAD_STORE_FILE，仅供本地分发）"
        else
          echo "  sign: $ZPASS_UPLOAD_STORE_FILE"
        fi

  aab:release:
    desc: 打包 Android release AAB（Play Store 上架格式）
    deps: [so]
    dir: "{{.REPO_ROOT}}/phone/android"
    cmds:
      - ./gradlew bundleRelease
      - |
        AAB="{{.REPO_ROOT}}/phone/android/app/build/outputs/bundle/release/app-release.aab"
        if [ ! -f "$AAB" ]; then
          echo "[error] 未找到 AAB：$AAB" >&2
          exit 1
        fi
        echo ""
        echo "[ok] release AAB 已生成"
        echo "  path: $AAB"
        echo "  size: $(du -h "$AAB" | awk '{print $1}')"

  # ---- 排错 ----

  doctor:
    desc: 检查环境（Java/NDK/cargo-ndk/AVD）
    silent: true
    cmds:
      - 'echo "JAVA_HOME       = $JAVA_HOME"'
      - 'echo "ANDROID_HOME    = $ANDROID_HOME"'
      - 'echo "ANDROID_NDK_HOME= $ANDROID_NDK_HOME"'
      - 'echo ""'
      # 直接调用 $JAVA_HOME/bin/java，绕开 task 不可靠的 PATH 覆盖
      - 'echo "[java]"; "$JAVA_HOME/bin/java" -version 2>&1 | head -1'
      - 'echo "[rust]"; cargo --version 2>/dev/null || echo "  (not installed: https://rustup.rs)"'
      - 'echo "[cargo-ndk]"; cargo ndk --version 2>/dev/null || echo "  (not installed: cargo install cargo-ndk)"'
      - 'echo "[adb]"; $ANDROID_HOME/platform-tools/adb version 2>&1 | head -1'
      - 'echo "[avd]"; $ANDROID_HOME/emulator/emulator -list-avds 2>&1 | sed "s/^/  /"'

  logcat:
    desc: 跟随 zpass app 的 ReactNativeJS / Expo / FATAL 日志
    cmds:
      - $ANDROID_HOME/platform-tools/adb logcat -v color ReactNativeJS:V ExpoModulesCore:V AndroidRuntime:E "*:S"
