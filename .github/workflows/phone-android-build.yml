name: Build Phone (Android)

# ZPass phone Android 多架构 APK 打包 workflow（Expo + React Native + Rust cryptocore .so）
# -----------------------------------------------------------------------------
# 目标矩阵:
#   - arm64-v8a   主流 Android 手机（2017 年后几乎全覆盖）
#   - x86_64      Chromebook / 部分平板 / Android Studio 模拟器
#   - universal   含 4 个 ABI 的兜底包，任何设备都能装
#
# 触发方式:
#   1. push tags 'v*'         自动构建并上传到对应 tag 的 GitHub Release
#   2. workflow_dispatch      手动触发；release=true + tag_name 非空时上传
#
# 关键设计:
#   - phone/android/ 是 expo prebuild 的产物（phone/.gitignore 里），CI 必须
#     先用 cargo-ndk 编 4 ABI 的 libcryptocore.so，再 `expo prebuild --platform android`。
#     prebuild 时 plugins/with-cryptocore.js 自动把 .so 复制到
#     android/app/src/main/jniLibs/<abi>/libcryptocore.so.
#   - 多架构通过 Gradle `splits.abi` 一次构建出多个 APK，避免跑 N 次 gradle.
#     splits 配置在 CI 里 patch 到 app/build.gradle —— 这个文件每次 prebuild
#     都会被重新生成，所以 patch 不会污染源码。
#   - include 全部 4 个 ABI 是为了让 universal APK 真的 universal（含 .so
#     齐全），即便最终只 release arm64-v8a / x86_64 / universal 三个 APK.
#   - 签名走 phone/android/app/build.gradle 默认逻辑：未设置 ZPASS_UPLOAD_*
#     gradle property 时回落到 debug.keystore. 产物可 adb install / 直接
#     分发到手机安装，但不可上架 Play Store，也无法覆盖已安装的正式签名版.
#   - RN 0.81 强制 JDK 17（系统默认 Java 26 会让 Kotlin Gradle Plugin 崩）.
#   - cargo-ndk 需要 NDK；runner 自带 $ANDROID_HOME/ndk/<ver>，
#     build-android.sh 会自动选最新版本.
# -----------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      release:
        description: "是否在构建完成后上传到 GitHub Release（需配合 tag_name）"
        required: false
        default: false
        type: boolean
      tag_name:
        description: "Release 的 tag 名（如 v0.1.0），release=true 时必填"
        required: false
        type: string
      force:
        description: "跳过目录变化检测，强制打包发布（手动补发某个版本时用）"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: phone-android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "stable"
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

jobs:
  # ===========================================================================
  # 变化检测 + 版本解析（解耦核心）
  # ---------------------------------------------------------------------------
  # phone 关心 phone/ 自身、共享的 cryptocore/（编 .so）、共享的 assets/（图标）。
  # 三者在「上一个 vX.Y.Z tag → 当前 tag」之间任一有改动才发布 phone 端 release。
  # 独立 release tag = phone-vX.Y.Z；展示版本 = X.Y.Z。
  # ===========================================================================
  detect:
    name: Detect phone changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.dv.outputs.changed }}
      publish: ${{ steps.dv.outputs.publish }}
      version: ${{ steps.dv.outputs.version }}
      source_tag: ${{ steps.dv.outputs.source_tag }}
      release_tag: ${{ steps.dv.outputs.release_tag }}
    steps:
      - name: Checkout (full history for tag diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: dv
        uses: ./.github/actions/detect-and-version
        with:
          component: phone
          paths: "phone cryptocore assets"
          ref_type: ${{ github.ref_type }}
          ref_name: ${{ github.ref_name }}
          event_name: ${{ github.event_name }}
          dispatch_tag: ${{ inputs.tag_name }}
          dispatch_release: ${{ inputs.release }}
          dispatch_force: ${{ inputs.force }}

  # ===========================================================================
  # Android - arm64-v8a + x86_64 + universal APK
  # ===========================================================================
  build-android:
    name: Android (arm64-v8a / x86_64 / universal)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
        working-directory: phone

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # phone 实际用 bun（Taskfile 全程 bunx；bun.lock 是最新锁文件，
      # package-lock.json 已落后，`npm ci` 会因 lockfile out-of-sync 直接拒绝）.
      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Cargo registry + cryptocore target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cryptocore/target
          key: ${{ runner.os }}-cargo-cryptocore-${{ hashFiles('cryptocore/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cryptocore-

      # cargo-ndk 必须装在 PATH 上，build-android.sh 才能找到.
      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk >/dev/null 2>&1; then
            cargo install cargo-ndk --locked
          fi

      # runner 自带 Android SDK，ANDROID_HOME 已经设好.
      # build-android.sh 会从 $ANDROID_HOME/ndk/<ver> 选最新 NDK；这里只
      # 顺手打印一下版本，方便排查.
      - name: Inspect Android SDK / NDK
        run: |
          echo "ANDROID_HOME      = $ANDROID_HOME"
          echo "ANDROID_NDK_ROOT  = ${ANDROID_NDK_ROOT:-(unset)}"
          if [ -d "$ANDROID_HOME/ndk" ]; then
            echo "Installed NDK versions:"
            ls -1 "$ANDROID_HOME/ndk" | sed 's/^/  /'
          fi

      - name: Install dependencies (bun)
        run: bun install --frozen-lockfile

      # 版本号由 detect job 从当前 tag 统一解析；回写到 app.json 的 expo.version，
      # 这样下一步 expo prebuild 生成的 android/app/build.gradle versionName
      # 与 app 内 expo-constants 读到的 version 完全一致。
      - name: Sync release version into app.json
        env:
          APP_VERSION: ${{ needs.detect.outputs.version }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          version = os.environ["APP_VERSION"]
          p = pathlib.Path("app.json")
          cfg = json.loads(p.read_text())
          old = cfg.get("expo", {}).get("version")
          cfg.setdefault("expo", {})["version"] = version
          p.write_text(json.dumps(cfg, indent=2) + "\n")
          print(f"[ok] app.json expo.version: {old} -> {version}")
          PY

      # 编 cryptocore Rust → 4 ABI libcryptocore.so（cargo-ndk）.
      # 产物在 cryptocore/build/jniLibs/<abi>/libcryptocore.so；下一步 expo prebuild
      # 会触发 with-cryptocore plugin 自动复制到
      # phone/android/app/src/main/jniLibs/<abi>/.
      - name: Build cryptocore .so (cargo-ndk, 4 ABI)
        working-directory: cryptocore
        run: bash scripts/build-android.sh

      # --no-install 跳过 expo 装 cocoapods / npm install 的额外开销，
      # 这里 npm ci 已经装过依赖.
      #
      # --clean 关键：先删掉仓库里已提交的 phone/android/ 再从 app.json 重新
      # 生成，确保 app 图标 / splash 等原生资源每次都从 assets/images/ 重新
      # 渲染。否则 prebuild 走增量模式，不会覆盖已存在的 ic_launcher*.webp，
      # 导致「改了源图标但打包出来还是旧图标」。with-cryptocore plugin 在
      # prebuild 的 android 阶段复制 .so，--clean 重建时同样会触发，故安全。
      - name: Expo prebuild (generate phone/android/)
        run: bunx expo prebuild --platform android --no-install --clean

      # --clean 会连同仓库里故意提交的 android/app/debug.keystore 一起删掉，
      # prebuild 重生的是模板自带 keystore。为保证 release APK 签名指纹
      # 跨构建稳定（用户能覆盖升级），这里从 git 还原被跟踪的那份.
      - name: Restore tracked debug.keystore (prevent signature drift after --clean)
        working-directory: phone
        run: git checkout -- android/app/debug.keystore

      # 把 ABI splits 配置注入到 app/build.gradle 的 android {} 块顶部.
      # 用 python re.sub 保证只在 android { 后插一次，且失败可见.
      # universalApk = true 让 gradle 额外产出一个含全部 ABI 的 APK，
      # 即便我们 release 时只挑 3 个发布，universal 也是真正全 ABI 的兜底.
      - name: Inject splits.abi into app/build.gradle
        working-directory: phone/android
        run: |
          python3 - <<'PY'
          import re, pathlib, sys
          p = pathlib.Path('app/build.gradle')
          src = p.read_text()
          splits = """
              splits {
                  abi {
                      enable true
                      reset()
                      include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
                      universalApk true
                  }
              }
          """
          new, n = re.subn(r'(android\s*\{\s*\n)', r'\1' + splits, src, count=1)
          if n != 1:
              sys.exit('[error] android { ... } block not found in app/build.gradle')
          p.write_text(new)
          print('[ok] splits.abi injected')
          PY
          grep -n 'splits' app/build.gradle

      # debug.keystore 由 build.gradle 默认 signingConfig 兜底；
      # 未设置 ZPASS_UPLOAD_STORE_FILE 时 release buildType 也复用 debug 签名.
      - name: Build release APKs (gradle assembleRelease)
        working-directory: phone/android
        run: ./gradlew assembleRelease --no-daemon

      # Gradle ABI splits + universalApk=true 的输出布局：
      #   app/build/outputs/apk/release/app-arm64-v8a-release.apk
      #   app/build/outputs/apk/release/app-armeabi-v7a-release.apk
      #   app/build/outputs/apk/release/app-x86-release.apk
      #   app/build/outputs/apk/release/app-x86_64-release.apk
      #   app/build/outputs/apk/release/app-universal-release.apk
      # 重命名为稳定的 release 资产名（无版本号），与 desktop 资产风格一致.
      - name: Stage release assets
        run: |
          mkdir -p release
          shopt -s nullglob

          OUT=android/app/build/outputs/apk/release

          for f in "$OUT"/app-arm64-v8a-release.apk; do
            cp "$f" "release/ZPass-android-arm64-v8a.apk"
          done
          for f in "$OUT"/app-x86_64-release.apk; do
            cp "$f" "release/ZPass-android-x86_64.apk"
          done
          for f in "$OUT"/app-universal-release.apk; do
            cp "$f" "release/ZPass-android-universal.apk"
          done

          echo "--- release/ contents ---"
          ls -lah release/

          # 三个产物缺一不可，缺则中断，提前暴露 splits 配置失效
          for required in \
            ZPass-android-arm64-v8a.apk \
            ZPass-android-x86_64.apk \
            ZPass-android-universal.apk; do
            if [ ! -f "release/$required" ]; then
              echo "[error] missing release asset: $required" >&2
              exit 1
            fi
          done

      - name: Generate phone release notes (git-cliff)
        if: needs.detect.outputs.publish == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --include-path "phone/**" --include-path "cryptocore/**" --include-path "assets/**"
        env:
          OUTPUT: ${{ github.workspace }}/PHONE_NOTES.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpass-android
          path: phone/release/*
          if-no-files-found: error

      # 发到 phone 端专属 release（phone-vX.Y.Z），与 desktop / extension 互不干扰。
      - name: Publish to phone GitHub Release
        if: needs.detect.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.release_tag }}
          name: ZPass Phone (Android) ${{ needs.detect.outputs.version }}
          body_path: ${{ github.workspace }}/PHONE_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: phone/release/*
