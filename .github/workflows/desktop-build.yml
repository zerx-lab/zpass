name: Build Desktop

# ZPass Desktop 多平台打包 workflow（Electron Forge + Vite 架构）
# -----------------------------------------------------------------------------
# 目标矩阵:
#   - Windows x64           NSIS 向导式 Setup .exe (electron-builder) + 便携 .zip
#   - Linux   x64           AppImage + .deb + .rpm + .pkg.tar.zst + 便携 .zip
#   - macOS   arm64         DMG (hdiutil) + 便携 .zip  (Apple Silicon, ad-hoc 签名)
#
# 触发方式:
#   1. push tags 'v*'         自动构建并上传到对应 tag 的 GitHub Release
#   2. workflow_dispatch      手动触发；release=true + tag_name 非空时上传
#
# 设计要点:
#   - Forge 通过 forge.config.ts 的 makers 配置在各 OS 上选用对应打包器
#       linux  -> MakerAppImage / MakerDeb / MakerRpm (+ MakerZIP)
#       win32  -> MakerZIP (便携包); NSIS 安装包由 electron-builder --prepackaged
#                 在 task make 之后对 Forge 打好的 out/zpass-win32-x64/ 二次封装
#       darwin -> MakerZIP; .dmg 由本 workflow 直接用 hdiutil 把签好名的 .app
#                 打包, 不引入 @electron-forge/maker-dmg 依赖.
#   - macOS Apple Silicon (arm64) 强制要求所有原生可执行通过 codesign, 哪怕只是
#     ad-hoc (identity '-'), 否则用户首次打开会看到 "App 已损坏" 硬阻断. 我们没有
#     付费的 Apple Developer ID, packagerConfig.osxSign 配 identity: '-' 即可让
#     Forge 调 @electron/osx-sign 做 ad-hoc 自签. 仍需用户在 "系统设置 -> 隐私
#     与安全性" 放行 (或 `xattr -dr com.apple.quarantine ...`), 但不会再撞 "已损坏".
#   - Arch (.pkg.tar.zst) 没有 Forge maker, 用 desktop/scripts/make-arch.sh
#     在 archlinux:latest 容器里调 makepkg 生成, 输入是 `task make` 已经产出
#     的 out/zpass-linux-x64/ 目录, 避免重复构建.
#   - 每个 job 直接 push 资产到 GitHub Release (softprops/action-gh-release),
#     绕开 actions/upload-artifact 500MB 配额 (Windows 安装包单个 .exe 上百 MB).
#     同时也用 upload-artifact 留一份方便 workflow_dispatch 下载验证.
# -----------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      release:
        description: "是否在构建完成后上传到 GitHub Release（需配合 tag_name）"
        required: false
        default: false
        type: boolean
      tag_name:
        description: "Release 的 tag 名（如 v0.1.0），release=true 时必填"
        required: false
        type: string
      force:
        description: "跳过目录变化检测，强制打包发布（手动补发某个版本时用）"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "20"
  PNPM_VERSION: "10.33.0"

jobs:
  # ===========================================================================
  # 变化检测 + 版本解析（解耦核心）
  # ---------------------------------------------------------------------------
  # tag push 没有 path filter，这里用 git diff 上一个 vX.Y.Z tag 判断 desktop/
  # 及其共享的 assets/ 是否有改动；无改动则后续 build job 全部跳过，desktop
  # 这一端不发任何 release。版本号取自当前 tag，独立 release tag = desktop-vX.Y.Z。
  # ===========================================================================
  detect:
    name: Detect desktop changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.dv.outputs.changed }}
      publish: ${{ steps.dv.outputs.publish }}
      version: ${{ steps.dv.outputs.version }}
      source_tag: ${{ steps.dv.outputs.source_tag }}
      release_tag: ${{ steps.dv.outputs.release_tag }}
    steps:
      - name: Checkout (full history for tag diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: dv
        uses: ./.github/actions/detect-and-version
        with:
          component: desktop
          paths: "desktop assets"
          ref_type: ${{ github.ref_type }}
          ref_name: ${{ github.ref_name }}
          event_name: ${{ github.event_name }}
          dispatch_tag: ${{ inputs.tag_name }}
          dispatch_release: ${{ inputs.release }}
          dispatch_force: ${{ inputs.force }}

  # ===========================================================================
  # Windows x64 - NSIS 向导式 Setup.exe (electron-builder) + 便携 zip
  # ===========================================================================
  build-windows:
    name: Windows x64 (NSIS Setup)
    runs-on: windows-latest
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # git-cliff 生成本端 release notes 需要完整 tag 历史
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: desktop/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: "3.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # 版本号已由 detect job 从当前 tag 统一解析；这里回写到 desktop/package.json：
      #   1. electron-forge / electron-builder 打包时读 package.json → 安装包内嵌版本
      #   2. vite.renderer.config.ts 构建期读 package.json → 注入 __APP_VERSION__ → 「关于」页
      # npm version 只改 package.json，不动 pnpm-lock.yaml，故不破坏 frozen-lockfile。
      - name: Sync release version into package.json
        env:
          APP_VERSION: ${{ needs.detect.outputs.version }}
        run: |
          npm version "$APP_VERSION" --no-git-tag-version --allow-same-version
          echo "[ok] desktop/package.json version -> $APP_VERSION"

      # `task make` 链路里 `task icons` 调 ImageMagick 的 `magick` 命令.
      # Chocolatey 的 imagemagick.app 包含 IM7, 自带 `magick`, 装好后直接在 PATH.
      - name: Install ImageMagick
        shell: pwsh
        run: choco install imagemagick.app -y --no-progress

      # 显式设 GOOS/GOARCH 防止 task build:go 在跨架构 runner 上猜错;
      # CGO_ENABLED=0 因为 Go 端依赖 modernc.org/sqlite (pure Go), 不需要
      # 链接 system libsqlite, 避免 Windows 上找不到 gcc 的麻烦.
      #
      # `task make` 在 win32 上现在只产出便携 zip + 已打包的 out/zpass-win32-x64/
      # (Forge packager 的 unpacked 目录, 含 asar / fuses / extraResource /
      # locale 裁剪 / win32metadata). NSIS 安装包由下一步用 electron-builder
      # 对这个目录二次封装, 不再走 Squirrel.
      - name: Build (task make → portable zip + packaged app dir)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: task make

      # 向导式 NSIS 安装包: electron-builder --prepackaged 直接吃上一步 Forge
      # 已打好的 out/zpass-win32-x64/, 跳过自己的打包阶段, 输出到 out/make/nsis/.
      # 配置见 desktop/electron-builder.win.yml (oneClick:false 启用安装向导).
      - name: Build NSIS installer (electron-builder --prepackaged)
        run: pnpm run make:win:nsis

      # 产物布局 (electron-builder.win.yml 的 artifactName 已固定为稳定名):
      #   out/make/nsis/ZPass-windows-x64-Setup.exe   (NSIS 向导安装包)
      #   out/make/nsis/latest.yml                     (electron-updater 元数据)
      #   out/make/zip/win32/x64/<name>-win32-x64-<version>.zip  (Forge 便携 zip)
      # exe 无需改名 (artifactName 即稳定名); latest.yml 必须随 Release 上传且
      # 不可改名 (electron-updater 按 latest.yml.path 拉取 exe)。
      # 注: differentialPackage:false → 不产 .blockmap, updater 端已 disableDifferentialDownload。
      # 便携 zip 仍重命名为稳定名。
      - name: Stage release assets
        run: |
          mkdir -p release
          shopt -s nullglob

          cp out/make/nsis/ZPass-windows-x64-Setup.exe release/ 2>/dev/null || true
          cp out/make/nsis/latest.yml                  release/ 2>/dev/null || true

          for f in out/make/zip/win32/x64/*.zip; do
            cp "$f" "release/ZPass-windows-x64.zip"
          done

          echo "--- release/ contents ---"
          ls -lah release/

          # NSIS exe 是必须产物, 缺了直接红, 别把只有 zip 的残包推给用户.
          if [ ! -f release/ZPass-windows-x64-Setup.exe ]; then
            echo "::error::NSIS installer not found in out/make/nsis/"
            ls -lah out/make/nsis/ || true
            exit 1
          fi

          # latest.yml 是自动更新的命脉, 缺了 = 用户端静默无法升级, 必须红。
          if [ ! -f release/latest.yml ]; then
            echo "::error::latest.yml not generated (auto-update metadata missing)"
            ls -lah out/make/nsis/ || true
            exit 1
          fi

      # 生成 desktop 端专属 release notes：只取触及 desktop/ 或 assets/ 的提交。
      # git-cliff 的 --include-path 按提交改动的文件路径过滤，正好对应解耦语义。
      - name: Generate desktop release notes (git-cliff)
        if: needs.detect.outputs.publish == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --include-path "desktop/**" --include-path "assets/**"
        env:
          OUTPUT: ${{ github.workspace }}/DESKTOP_NOTES.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpass-windows-x64
          path: desktop/release/*
          if-no-files-found: error

      # 发到 desktop 端专属 release（desktop-vX.Y.Z），与 phone / extension 互不干扰。
      # tag 不存在时 action 会在当前 commit 上自动创建；name/body 多 job 写入一致，
      # 故先后到达无所谓。便携 zip / NSIS / latest.yml 都追加到此 release。
      - name: Publish to desktop GitHub Release
        if: needs.detect.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.release_tag }}
          name: ZPass Desktop ${{ needs.detect.outputs.version }}
          body_path: ${{ github.workspace }}/DESKTOP_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: desktop/release/*

  # ===========================================================================
  # Linux x64 - AppImage + .deb + .rpm + .pkg.tar.zst + 便携 zip
  # ===========================================================================
  build-linux:
    name: Linux x64 (AppImage / deb / rpm / pacman)
    runs-on: ubuntu-22.04
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: desktop/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: "3.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Forge maker 的系统依赖:
      #   fakeroot + dpkg      MakerDeb (electron-installer-debian)
      #   rpm + rpm-build      MakerRpm (electron-installer-redhat)
      #   libfuse2             AppImage runtime (生成 + 测试时 mount)
      #   desktop-file-utils   .desktop 文件校验
      #   imagemagick          `task icons` 调用 magick 重新生成 PNG (ubuntu
      #                        默认装的是 IM6, 提供 convert 但没有 magick
      #                        二进制 - 下一步写 wrapper 桥接)
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fakeroot dpkg \
            rpm \
            libfuse2 \
            file desktop-file-utils \
            imagemagick

      # IM6 没有 `magick` 命令, Taskfile 的 icons task 又硬调 `magick ... -resize`.
      # 写个 thin wrapper 转发到 IM6 的 convert, 语法兼容. 避免改 Taskfile.
      - name: Provide `magick` shim → convert (IM6 兼容)
        run: |
          sudo tee /usr/local/bin/magick > /dev/null <<'EOF'
          #!/usr/bin/env bash
          exec convert "$@"
          EOF
          sudo chmod +x /usr/local/bin/magick
          magick -version | head -n1

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # 版本号由 detect job 统一解析；回写到 desktop/package.json（同 windows job）。
      - name: Sync release version into package.json
        env:
          APP_VERSION: ${{ needs.detect.outputs.version }}
        run: |
          npm version "$APP_VERSION" --no-git-tag-version --allow-same-version
          echo "[ok] desktop/package.json version -> $APP_VERSION"

      - name: Build (task make → AppImage + deb + rpm + zip)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: task make

      # makepkg 只能在 Arch 上跑, 起 archlinux:latest 容器, mount desktop/
      # 到 /work 并以非 root 的 builder 用户跑 scripts/make-arch.sh.
      # 上一步 `task make` 已经顺带产出 out/zpass-linux-x64/, 正好是
      # make-arch.sh 需要的输入, 不会重复打包.
      #
      # docker 里 chown 给 builder 后, host runner 用户对 desktop/ 失去
      # 写权, 后续 Stage release assets 的 mkdir release 会拒. 退出 docker
      # 后立即 chown 回 runner UID/GID.
      - name: Build Arch pacman package (docker archlinux + makepkg)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/desktop:/work" \
            -w /work \
            archlinux:latest \
            bash -c '
              set -euxo pipefail
              pacman -Syu --noconfirm --needed base-devel nodejs sudo
              useradd -m -d /home/builder builder
              chown -R builder:builder /work
              sudo -u builder env HOME=/home/builder bash scripts/make-arch.sh
            '
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/desktop"

      # Forge 输出布局:
      #   out/make/AppImage/x64/<name>-<version>-<arch>.AppImage
      #   out/make/deb/x64/<name>_<version>_amd64.deb
      #   out/make/rpm/x64/<name>-<version>-<rel>.x86_64.rpm
      #   out/make/arch/<name>-<version>-1-x86_64.pkg.tar.zst
      #   out/make/zip/linux/x64/<name>-linux-x64-<version>.zip
      - name: Stage release assets
        run: |
          mkdir -p release
          shopt -s nullglob

          for f in out/make/AppImage/x64/*.AppImage; do
            cp "$f" "release/ZPass-linux-x64.AppImage"
          done
          for f in out/make/deb/x64/*.deb; do
            cp "$f" "release/ZPass-linux-x64.deb"
          done
          for f in out/make/rpm/x64/*.rpm; do
            cp "$f" "release/ZPass-linux-x64.rpm"
          done
          for f in out/make/arch/*.pkg.tar.zst; do
            cp "$f" "release/ZPass-linux-x64.pkg.tar.zst"
          done
          for f in out/make/zip/linux/x64/*.zip; do
            cp "$f" "release/ZPass-linux-x64.zip"
          done

          echo "--- release/ contents ---"
          ls -lah release/

      - name: Generate desktop release notes (git-cliff)
        if: needs.detect.outputs.publish == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --include-path "desktop/**" --include-path "assets/**"
        env:
          OUTPUT: ${{ github.workspace }}/DESKTOP_NOTES.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpass-linux-x64
          path: desktop/release/*
          if-no-files-found: error

      - name: Publish to desktop GitHub Release
        if: needs.detect.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.release_tag }}
          name: ZPass Desktop ${{ needs.detect.outputs.version }}
          body_path: ${{ github.workspace }}/DESKTOP_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: desktop/release/*

  # ===========================================================================
  # macOS arm64 (Apple Silicon) - DMG (hdiutil) + 便携 zip, ad-hoc 自签名
  # ===========================================================================
  build-macos-arm64:
    name: macOS arm64 (Apple Silicon - DMG + zip, ad-hoc signed)
    # macos-14 / macos-latest 已经是 Apple Silicon (M1) runner, 这里钉死 macos-14
    # 显式表达 arm64 意图, 避免某天 GitHub 把 latest 切回 Intel 时静默回归.
    runs-on: macos-14
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: desktop/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: "3.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      # 版本号由 detect job 统一解析；回写到 desktop/package.json（同 windows job）。
      - name: Sync release version into package.json
        env:
          APP_VERSION: ${{ needs.detect.outputs.version }}
        run: |
          npm version "$APP_VERSION" --no-git-tag-version --allow-same-version
          echo "[ok] desktop/package.json version -> $APP_VERSION"

      # macos-14 runner 不再预装 ImageMagick 7, 显式 brew install.
      # `task icons` 依赖 `magick` 命令把 ../assets/logo.png 缩放成各尺寸 PNG.
      - name: Install ImageMagick
        run: brew install imagemagick

      # 显式钉死 GOOS / GOARCH 防 task build:go 在跨架构 runner 上判错.
      #
      # CGO_ENABLED=1: cmd/zpass-agent/peer_darwin.go 用 cgo 调 libproc.proc_pidpath
      # 拿对端进程路径 (macOS 没有 SO_PEERCRED). 这是 darwin→darwin native build,
      # 没有跨编译工具链问题; modernc.org/sqlite 是 pure Go, 对 CGO_ENABLED 不敏感.
      #
      # 真正的 ad-hoc 签名发生在 task make -> electron-forge make -> packager 阶段:
      # forge.config.ts 里 packagerConfig.osxSign.identity = "-" 让 @electron/osx-sign
      # 递归对 out/zpass-darwin-arm64/zpass.app 内的所有可执行 ad-hoc 签名.
      - name: Build (task make → ad-hoc 签名 .app + zip)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: task make

      # @electron/osx-sign 会签 .app/Contents/MacOS 下的 Electron 主二进制 +
      # Frameworks/, 但 extraResource (./bin/ + ./assets/logo/) 拷到
      # Contents/Resources/ 后, 里面的 Go sidecar / agent / native-host
      # **不会**被 osx-sign 主动识别签上. 在 Apple Silicon (macOS 14+) 上,
      # 任何未签名的 Mach-O 子进程 spawn 时都会被 dyld 直接拒载, 父进程
      # 接到 SIGKILL -> 用户看到 "zpass 意外退出" 弹窗.
      #
      # 这里显式自己来: 先 ad-hoc 签所有 Resources/bin 下的二进制 (内层),
      # 再对整个 .app 走 --deep --force 兜底 (外层). 顺序必须从内往外,
      # 因为 codesign 校验时外层签名包含内层 hash.
      - name: Deep-sign .app (ad-hoc) over nested sidecar binaries
        run: |
          APP="out/zpass-darwin-arm64/zpass.app"
          if [ ! -d "$APP" ]; then
            echo "::error::expected $APP not found"
            ls -la out/ || true
            exit 1
          fi
          find "$APP/Contents/Resources/bin" -type f \
            -exec codesign --force --sign - {} \;
          codesign --force --deep --sign - "$APP"

      # 校验 ad-hoc 签名状态. 这次**不**吞错: 没签上就直接红, 否则相当于把坏包
      # 推给用户. 真正的最终验收仍然在用户机器的 Gatekeeper.
      - name: Verify ad-hoc signature on .app
        run: |
          APP="out/zpass-darwin-arm64/zpass.app"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 | head -n 20

      # forge.config.ts 里没启 MakerDMG (避免引新依赖), 直接用 macOS 自带的
      # hdiutil 把已经 ad-hoc 签好名的 .app 包成只读压缩 dmg (UDZO).
      # 跟 zip 同一个源 .app, 所以签名状态一致.
      #
      # 不传 `-volicon`: macOS 26 (macos-14 runner 自 2026-05 起 image) 上
      # `hdiutil create` 已经移除了 -volicon 选项, 传它会直接 fail with
      # "unknown option". DMG 卷宗本身因此用系统默认磁盘图标, 但 .app 内部
      # 的品牌图标 (由 task icns -> assets/logo/zpass.icns -> Forge 嵌入)
      # 不受影响, Finder 显示 dmg 文件时也按 UTI 走默认. 想恢复卷宗图标
      # 需要 mount 后写 .VolumeIcon.icns + bless, 在 macOS 26 上同样被收紧,
      # 价值不抵复杂度, 等以后再说.
      - name: Create DMG from signed .app
        run: |
          APP="out/zpass-darwin-arm64/zpass.app"
          mkdir -p out/make/dmg
          hdiutil create \
            -volname "ZPass" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            out/make/dmg/ZPass-darwin-arm64.dmg

      # Forge 输出布局:
      #   out/zpass-darwin-arm64/zpass.app
      #   out/make/zip/darwin/arm64/<name>-darwin-arm64-<version>.zip
      # 加上我们刚 hdiutil 产出的:
      #   out/make/dmg/ZPass-darwin-arm64.dmg
      - name: Stage release assets
        run: |
          mkdir -p release
          shopt -s nullglob

          for f in out/make/dmg/*.dmg; do
            cp "$f" "release/ZPass-darwin-arm64.dmg"
          done
          for f in out/make/zip/darwin/arm64/*.zip; do
            cp "$f" "release/ZPass-darwin-arm64.zip"
          done

          echo "--- release/ contents ---"
          ls -lah release/

      - name: Generate desktop release notes (git-cliff)
        if: needs.detect.outputs.publish == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --include-path "desktop/**" --include-path "assets/**"
        env:
          OUTPUT: ${{ github.workspace }}/DESKTOP_NOTES.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpass-darwin-arm64
          path: desktop/release/*
          if-no-files-found: error

      - name: Publish to desktop GitHub Release
        if: needs.detect.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.release_tag }}
          name: ZPass Desktop ${{ needs.detect.outputs.version }}
          body_path: ${{ github.workspace }}/DESKTOP_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: desktop/release/*
