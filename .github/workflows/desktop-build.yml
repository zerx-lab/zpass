name: Build Desktop

# ZPass Desktop 多平台打包 workflow
# -----------------------------------------------------------------------------
# 目标矩阵（6 个组合，每个目标在原生 runner 上跑，回避交叉编译 CGO 难题）:
#   - Windows  amd64 / arm64  → NSIS .exe 安装器 + 原始 .exe
#   - macOS    amd64 / arm64  → .app bundle 用 ditto 打成 .zip
#   - Linux    amd64 / arm64  → AppImage + .deb + .rpm + 裸 binary
#
# 触发方式:
#   1. workflow_dispatch  手动触发（不发 release，只产 artifact）
#   2. push tags 'v*'     自动构建并发布 GitHub Release
#
# 注意：项目 Taskfile 中 APP_NAME="ZPassDesktop"（保持与 wails 模板一致），
# workflow 内对产物的引用都用 ZPassDesktop 这个真名。最终 release 资产名通过
# 重命名步骤换成更短的 ZPass-<os>-<arch> 形式。
# -----------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      release:
        description: '是否在构建完成后创建 GitHub Release（仅当填写 tag_name 时生效）'
        required: false
        default: false
        type: boolean
      tag_name:
        description: '可选：用于 Release 的 tag 名（如 v0.1.0），留空则只产 artifact'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 发布 Release 需要写权限

# 同一 ref 上的并发构建互相取消，避免连续提交造成 runner 浪费
concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 主构建：6 个目标并行
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            cgo: '0'
          - target: windows-arm64
            runner: windows-latest
            goos: windows
            goarch: arm64
            cgo: '0'
          - target: macos-amd64
            runner: macos-13       # Intel 原生 runner，CGO 必须 native
            goos: darwin
            goarch: amd64
            cgo: '1'
          - target: macos-arm64
            runner: macos-14       # Apple Silicon 原生 runner
            goos: darwin
            goarch: arm64
            cgo: '1'
          - target: linux-amd64
            runner: ubuntu-22.04
            goos: linux
            goarch: amd64
            cgo: '1'
          - target: linux-arm64
            runner: ubuntu-22.04-arm  # GitHub 公开仓库免费 ARM64 runner
            goos: linux
            goarch: arm64
            cgo: '1'

    env:
      # nfpm.yaml 用 ${GIT_COMMITTER_NAME} / ${GIT_COMMITTER_EMAIL} 做模板替换，
      # 在 CI 上必须显式设，否则生成的 .deb / .rpm 元数据里会出现空字符串
      GIT_COMMITTER_NAME: github-actions
      GIT_COMMITTER_EMAIL: github-actions@users.noreply.github.com
      # ⚠️ 故意不在这里设 GOARCH。原因：wails3 install / npm 等步骤必须使用
      # host 架构（windows-latest 是 AMD64，若 GOARCH=arm64 会编译出无法在
      # host 上执行的 ARM64 wails3.exe）。GOARCH 只在 Build/Package step 内
      # 设置，那时 Taskfile 已经收到了 ARCH=xxx 参数。

    defaults:
      run:
        shell: bash
        working-directory: desktop

    steps:
      # ---------- 0. 检出 ----------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- 1. 工具链 ----------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: desktop/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # ---------- 2. 平台特定依赖（必须在安装 wails3 CLI 之前） ----------
      # wails3 alpha 的 internal/operatingsystem 包通过 CGO 链接 gtk+-3.0 和
      # webkit2gtk-4.1，所以 Linux runner 上必须先装 -dev 包，否则连 wails3
      # 自己都编译不出来
      - name: Install Linux build deps (GTK3 + WebKit2GTK 4.1 + rpm)
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            rpm \
            fuse libfuse2 \
            file desktop-file-utils

      - name: Install NSIS (Windows installer 打包工具)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # NSIS 装到 C:\Program Files (x86)\NSIS，但 GitHub Actions 不会自动
          # 把这个目录加到 PATH，需要显式写入 $GITHUB_PATH 才能让后续 step 中
          # 的 Task 调用 makensis
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # ---------- 3. Wails3 CLI ----------
      # 必须用 host 架构编译，否则 cross-compile 出来的 wails3.exe 在 host
      # 上无法执行。显式 unset GOARCH（让 go 用默认 host arch）。
      - name: Install Wails3 CLI
        env:
          GOARCH: ''      # 用 host 架构编译 wails3 binary
          CGO_ENABLED: '1'  # Linux 上 wails3 自身需要 CGO（链接 GTK）
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      # ---------- 4. 前端依赖（显式触发，让 setup-node 的 npm cache 生效） ----------
      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      # ---------- 5. 构建二进制 ----------
      # task build 会按链路自动跑：
      #   common:go:mod:tidy → common:build:frontend → common:generate:icons → {windows|darwin|linux}:build:native → go build
      - name: Build binary
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: task build ARCH=${{ matrix.goarch }}

      # ---------- 6. 打包 ----------
      # task package 按平台跑：
      #   - windows: create:nsis:installer
      #   - darwin : create:app:bundle (.app)
      #   - linux  : create:appimage + create:deb + create:rpm + create:aur
      - name: Package
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: task package ARCH=${{ matrix.goarch }}

      # ---------- 7. 整理产物（macOS 必须用 ditto） ----------
      # .app 是目录，用 actions/upload-artifact 直接上传会破坏 bundle 的
      # 符号链接和扩展属性，必须先用 ditto 打成 zip
      - name: Repack macOS .app to .zip (with ditto)
        if: matrix.goos == 'darwin'
        run: |
          cd bin
          ditto -c -k --sequesterRsrc --keepParent "ZPassDesktop.app" "ZPass-macos-${{ matrix.goarch }}.zip"
          echo "--- bin/ contents ---"
          ls -lah

      - name: Rename Windows binary / installer
        if: matrix.goos == 'windows'
        run: |
          # 裸 binary 加架构后缀
          if [ -f "bin/ZPassDesktop.exe" ]; then
            cp "bin/ZPassDesktop.exe" "bin/ZPass-windows-${{ matrix.goarch }}.exe"
          fi
          # NSIS 安装器（项目 NSIS 模板默认输出 ZPassDesktop-<arch>-installer.exe）
          if [ -f "bin/ZPassDesktop-${{ matrix.goarch }}-installer.exe" ]; then
            cp "bin/ZPassDesktop-${{ matrix.goarch }}-installer.exe" \
               "bin/ZPass-windows-${{ matrix.goarch }}-installer.exe"
          fi
          echo "--- bin/ contents ---"
          ls -lah bin/

      - name: Rename Linux binary
        if: matrix.goos == 'linux'
        run: |
          if [ -f "bin/ZPassDesktop" ]; then
            cp "bin/ZPassDesktop" "bin/ZPass-linux-${{ matrix.goarch }}"
          fi
          echo "--- bin/ contents ---"
          ls -lah bin/

      # ---------- 8. 上传 artifact ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zpass-desktop-${{ matrix.target }}
          # if-no-files-found: ignore 容忍单平台没产某种格式（如 macOS 无 .deb）
          path: |
            desktop/bin/ZPass-windows-${{ matrix.goarch }}.exe
            desktop/bin/ZPass-windows-${{ matrix.goarch }}-installer.exe
            desktop/bin/ZPass-macos-${{ matrix.goarch }}.zip
            desktop/bin/ZPass-linux-${{ matrix.goarch }}
            desktop/bin/*.AppImage
            desktop/bin/*.deb
            desktop/bin/*.rpm
            desktop/bin/*.pkg.tar.zst
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 6

  # ---------------------------------------------------------------------------
  # Release：仅在 push tag 或手动指定 tag_name + release=true 时跑
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.release == true && inputs.tag_name != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected assets
        run: |
          echo "--- dist/ tree ---"
          find dist -type f -printf '%p  (%s bytes)\n' | sort

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          name: ZPass Desktop ${{ inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/**
