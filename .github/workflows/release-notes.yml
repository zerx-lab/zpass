name: Release Notes (git-cliff)

# 在 push tag 时用 git-cliff 生成本次 release 的更新日志，
# 创建 / 更新对应的 GitHub Release，并把 changelog 写入 body。
#
# 设计要点：
#   - 单独的 workflow，与 desktop-build / phone-android-build 解耦：
#     build workflow 只负责上传产物（不再设置 body / name），
#     release notes 由本 workflow 单点产出，避免多 job 互相覆盖。
#   - 与 build workflow 并行启动；softprops/action-gh-release 在 release
#     已存在时会复用，未存在时创建，因此谁先到无所谓 —— 最终 body 一定是
#     本 workflow 写入的 git-cliff 结果。
#   - workflow_dispatch 提供手动重跑入口（修了 cliff.toml 或漏掉某个 tag
#     时可以重新生成 body 而不必重发布）。

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release 的 tag 名（如 v0.1.0）"
        required: true
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: release-notes-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-notes:
    name: Generate notes with git-cliff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for git-cliff)
        uses: actions/checkout@v4
        with:
          # git-cliff 需要完整 tag 历史才能定位 "上一 tag → 本次 tag" 区间
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      # orhun/git-cliff-action 是官方 action，自带固定版本的 git-cliff 二进制。
      # --latest 只生成最近一个 tag 区间的内容，正好对应当前 release。
      - name: Generate changelog (git-cliff --latest)
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Inspect generated notes
        run: |
          echo "--- RELEASE_NOTES.md ---"
          cat RELEASE_NOTES.md
          echo "------------------------"

      # 创建 / 更新 release，写入 name + body。
      # 不指定 files，构建产物由 desktop-build / phone-android-build 各自上传。
      - name: Publish release with notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ZPass ${{ steps.tag.outputs.name }}
          body_path: RELEASE_NOTES.md
          # 不要让 GitHub 再追加 auto-generated notes，否则会和 git-cliff 输出重复
          generate_release_notes: false
          # 保留已有 release 资产（build workflow 可能更早上传）
          fail_on_unmatched_files: false
