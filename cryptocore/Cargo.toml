[package]
name = "cryptocore"
version = "0.1.0"
edition = "2024"
publish = false
license = "MIT"
description = "ZPass cross-platform crypto primitives (Argon2id + XChaCha20-Poly1305). 同一 vault 文件可在 desktop / phone / extension 间互通解读。"

[lib]
# rlib  —— 给 Rust 端测试 / 未来 desktop 复用
# cdylib —— 给 Android / HarmonyOS NAPI / iOS 出 .so / .dylib
# staticlib —— 给 iOS 出 .a
crate-type = ["rlib", "cdylib", "staticlib"]

[features]
default = []
android = ["dep:jni"]

[dependencies]
# RFC 9106 Argon2id；与 Go 的 golang.org/x/crypto/argon2 字节级对齐
argon2 = { version = "0.5", default-features = false, features = ["alloc"] }
# XChaCha20-Poly1305；与 Go 的 chacha20poly1305.NewX 字节级对齐
chacha20poly1305 = { version = "0.10", default-features = false, features = ["alloc"] }
# 操作系统 CSPRNG；失败要返错而非 panic
rand_core = { version = "0.6", features = ["std"] }
getrandom = "0.2"
# 仅在 feature=android 时启用
jni = { version = "0.21", default-features = false, optional = true }

# ---- sync 子模块依赖（同步协议；PAKE 握手 + CBOR proto + 会话 AEAD） ----
# SPAKE2 PAKE 实现（magic-wormhole 同款，生产级）
spake2 = "0.4"
# 协议消息序列化
serde = { version = "1", features = ["derive"] }
serde_bytes = "0.11"
# CBOR 编码（确定性编码 / 无外部 schema 文件 / std 友好）
ciborium = "0.2"
# 二进制 SHA-256（用于 contentHash 与协议 transcript hash）
sha2 = { version = "0.10", default-features = false }
# 常数时间比较（防止侧信道）
subtle = "2.5"
# 协议十六进制编码（PIN 派生输入 / 会话 ID 展示）
hex = "0.4"

[dev-dependencies]

[profile.release]
# 体积优先：移动端的 .so 越小越好
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
